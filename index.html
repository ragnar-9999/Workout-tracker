<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workout Tracker</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#080808;color:#F0F0F0;}
    input,button{font-family:inherit;}
    input{outline:none;}

    /* Login */
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
    .login-card{background:#111;border:1px solid #1E1E1E;border-radius:16px;padding:32px 28px;width:100%;max-width:360px;}
    .login-label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
    .login-input{width:100%;background:#0A0A0A;border:1px solid #1E1E1E;border-radius:8px;color:#F0F0F0;font-size:14px;padding:11px 14px;margin-bottom:14px;transition:border-color 0.2s;}
    .login-input:focus{border-color:#444;}
    .login-btn{width:100%;padding:12px;background:#E8572A;border:none;border-radius:8px;color:#FFF;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;}
    .login-btn:disabled{opacity:0.5;cursor:not-allowed;}
    .login-error{font-size:12px;color:#F87171;margin-top:10px;text-align:center;min-height:18px;}

    /* Tabs */
    .tab-bar{display:flex;border-bottom:1px solid #1A1A1A;background:#0A0A0A;overflow-x:auto;-webkit-overflow-scrolling:touch;}
    .tab-btn{background:transparent;border:none;border-bottom:2px solid transparent;color:#444;padding:11px 15px;cursor:pointer;font-size:11px;white-space:nowrap;}
    .tab-btn.active{background:#111;color:#F0F0F0;font-weight:700;}

    /* Cards */
    .ex-card{margin-bottom:8px;background:#111;border-radius:10px;border:1px solid #1C1C1C;overflow:hidden;transition:border-color 0.3s;}
    .ex-card.done{border-color:#1A3A1A;}
    .ex-header{padding:11px 13px;cursor:pointer;display:flex;align-items:center;gap:10px;}

    /* Inputs */
    .set-input{background:#0A0A0A;border:1px solid #1E1E1E;border-radius:6px;color:#E0E0E0;font-size:12px;padding:5px 9px;width:100%;box-sizing:border-box;}
    .set-input:focus{border-color:#444;}
    .set-input::placeholder{color:#252525;}

    /* Save btn */
    .ex-save-btn{width:100%;padding:10px;background:#0F0F0F;border:1px solid #222;border-radius:8px;color:#666;font-size:12px;font-weight:600;cursor:pointer;margin-top:8px;letter-spacing:0.5px;transition:all 0.2s;}
    .ex-save-btn:hover{background:#1A1A1A;color:#AAA;}
    .ex-save-btn.saving{color:#444;pointer-events:none;}
    .ex-save-btn.saved{background:#0A1F0A;border-color:#1A3A1A;color:#4ADE80;}

    /* Delete */
    .delete-btn{background:none;border:none;color:#2A2A2A;cursor:pointer;font-size:11px;padding:2px 5px;border-radius:4px;flex-shrink:0;}
    .delete-btn:hover{color:#EF4444;background:#1A0808;}

    /* Sign out */
    .signout-btn{background:none;border:1px solid #1E1E1E;border-radius:6px;color:#444;font-size:10px;padding:4px 10px;cursor:pointer;}
    .signout-btn:hover{color:#888;border-color:#333;}

    /* Toast */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A3A1A;border:1px solid #2A5A2A;color:#4ADE80;padding:10px 20px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;white-space:nowrap;}
    .toast.show{opacity:1;}
    .toast.error{background:#3A1A1A;border-color:#5A2A2A;color:#F87171;}

    /* Timer */
    .timer-bar{position:fixed;bottom:0;left:0;right:0;background:#0F0F0F;border-top:1px solid #1A1A1A;padding:10px 16px;display:flex;align-items:center;gap:12px;z-index:100;}
    .timer-display{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;min-width:60px;}
    .timer-display.warning{color:#FFB800;}
    .timer-display.overtime{color:#EF4444;}
    .timer-label{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:1px;flex:1;}
    .timer-btn{padding:6px 12px;border-radius:6px;border:1px solid #2A2A2A;background:#1A1A1A;color:#888;font-size:11px;cursor:pointer;font-weight:600;}
    .timer-btn:hover{color:#CCC;border-color:#444;}
    .timer-btn.primary{background:#1A3A1A;border-color:#2A5A2A;color:#4ADE80;}
    .timer-progress{position:absolute;top:0;left:0;height:2px;background:#4ADE80;transition:width 0.5s linear;}
    .timer-progress.warning{background:#FFB800;}
    .timer-progress.overtime{background:#EF4444;}
    .timer-presets{display:flex;gap:6px;}
    .timer-preset{padding:4px 8px;border-radius:4px;border:1px solid #1E1E1E;background:#0A0A0A;color:#555;font-size:10px;cursor:pointer;}
    .timer-preset:hover{color:#AAA;border-color:#333;}
    .timer-preset.active{border-color:#4ADE80;color:#4ADE80;background:#0A1F0A;}
  </style>
</head>

// ── Utils ─────────────────────────────────────────────────────────────────
function getWeekKey(date){const d=new Date(date),day=d.getDay();const mon=new Date(d);mon.setDate(d.getDate()-(day===0?6:day-1));return mon.toISOString().slice(0,10);}
function todayStr(){const d=new Date();return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;}
function parseDate(s){const[d,m,y]=s.split('/');return new Date(+y,+m-1,+d);}
function showToast(msg,err){const t=document.getElementById("toast");t.textContent=msg;t.className="toast show"+(err?" error":"");setTimeout(()=>t.className="toast",2500);}

// ── Timer state ───────────────────────────────────────────────────────────
let timerInterval=null;
let timerSeconds=0;
let timerTarget=90; // default 90 sec rest
let timerRunning=false;
let timerStarted=false;

function startTimer(){
  if(timerRunning) return;
  timerRunning=true;timerStarted=true;timerSeconds=0;
  if(timerInterval) clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timerSeconds++;
    renderTimer();
    if(timerSeconds===timerTarget){
      // vibrate if supported
      if(navigator.vibrate) navigator.vibrate([200,100,200]);
      showToast("⏱ Rest done — next set!");
    }
  },1000);
  renderTimer();
}

function resetTimer(){
  clearInterval(timerInterval);
  timerRunning=false;timerStarted=false;timerSeconds=0;
  renderTimer();
}

function formatTime(s){const m=Math.floor(s/60);const sec=s%60;return`${m}:${String(sec).padStart(2,'0')}`;}

function renderTimer(){
  const bar=document.getElementById("timerBar");
  if(!bar) return;
  const pct=timerStarted?Math.min((timerSeconds/timerTarget)*100,100):0;
  const isWarning=timerSeconds>=timerTarget*0.8&&timerSeconds<timerTarget;
  const isOver=timerSeconds>=timerTarget;
  const cls=isOver?"overtime":isWarning?"warning":"";
  const progCls=isOver?"timer-progress overtime":isWarning?"timer-progress warning":"timer-progress";
  const displayTime=timerStarted?formatTime(timerSeconds):"0:00";
  const label=!timerStarted?"Tap after each set to start rest timer":isOver?`+${formatTime(timerSeconds-timerTarget)} over`:`Rest — ${formatTime(timerTarget-timerSeconds)} left`;
  const presets=[60,90,120,180];
  const presetsHTML=presets.map(p=>`<button class="timer-preset${timerTarget===p?' active':''}" onclick="setTimerTarget(${p})">${p}s</button>`).join("");
  bar.innerHTML=`
    <div class="${progCls}" style="width:${pct}%"></div>
    <div>
      <div class="timer-display ${cls}">${displayTime}</div>
      <div class="timer-label">${label}</div>
    </div>
    <div class="timer-presets">${presetsHTML}</div>
    <button class="timer-btn primary" onclick="startTimer()">▶ Start</button>
    <button class="timer-btn" onclick="resetTimer()">↺</button>
  `;
}

window.setTimerTarget=function(s){timerTarget=s;renderTimer();};
window.startTimer=startTimer;
window.resetTimer=resetTimer;

// ── State ─────────────────────────────────────────────────────────────────
let activeDay=(()=>{const d=new Date().getDay();return DAYS[d===0?6:d-1];})();
let logs={};
let recentCache={};
let exSaveStatus={};
let savedExercises=new Set();
let expandedEx=null;

// ── Cache ─────────────────────────────────────────────────────────────────
function ck(hk,ex){return`${hk}__${ex}`;}
function initCache(){for(const[dk,em]of Object.entries(SEED))for(const[en,arr]of Object.entries(em))recentCache[ck(dk,en)]=[...arr];}
function getRecent(hk,ex){return recentCache[ck(hk,ex)]||[];}
function injectEntry(hk,ex,date,weight,reps){const k=ck(hk,ex);if(!recentCache[k])recentCache[k]=[];recentCache[k]=recentCache[k].filter(e=>e.date!==date);recentCache[k].push({date,weight,reps:reps||0});recentCache[k].sort((a,b)=>parseDate(a.date)-parseDate(b.date));if(recentCache[k].length>8)recentCache[k]=recentCache[k].slice(-8);}
function removeEntry(hk,ex,date){const k=ck(hk,ex);if(recentCache[k])recentCache[k]=recentCache[k].filter(e=>e.date!==date);}
function isThisWeek(dateStr){const entry=parseDate(dateStr),mon=new Date(weekKey);const sun=new Date(mon);sun.setDate(mon.getDate()+6);return entry>=mon&&entry<=sun;}

// ── Best ──────────────────────────────────────────────────────────────────
function computeBest(hk,exName){
  const seed=BEST[hk]?.[exName];
  let best=seed?{w:seed.w,r:seed.r,score:seed.w*seed.r}:null;
  const recent=getRecent(hk,exName);
  for(const e of recent){const score=e.weight*(e.reps||1);if(!best||score>best.score)best={w:e.weight,r:e.reps||0,score};}
  return best;
}

// ── Firebase ──────────────────────────────────────────────────────────────
async function loadDay(dayName){
  const day=PLAN[dayName];
  if(!day.histKey||!currentUser)return;
  try{
    const ss=await getDoc(doc(db,`users/${currentUser.uid}/sessions/${weekKey}_${dayName}`));
    if(ss.exists()){const data=ss.data();logs=data.sets||{};savedExercises=new Set(Object.keys(logs));}
    const hs=await getDoc(doc(db,`users/${currentUser.uid}/history/${day.histKey}`));
    if(hs.exists())for(const[en,arr]of Object.entries(hs.data()))if(Array.isArray(arr))for(const e of arr)injectEntry(day.histKey,en,e.date,e.weight,e.reps||0);
  }catch(e){console.error("Load:",e);}
  render();
}

async function saveExercise(exName){
  if(!currentUser)return;
  const day=PLAN[activeDay];
  exSaveStatus[exName]="saving";render();
  const exLogs=logs[exName]||{};
  const entries=Object.values(exLogs);
  const weights=entries.map(s=>parseFloat(s.weight)).filter(w=>!isNaN(w)&&w>0);
  const maxW=weights.length>0?Math.max(...weights):null;
  let bestReps=0;
  if(maxW){for(const s of entries){if(parseFloat(s.weight)===maxW){const r=parseInt(s.reps)||0;if(r>bestReps)bestReps=r;}}}
  try{
    const sRef=doc(db,`users/${currentUser.uid}/sessions/${weekKey}_${activeDay}`);
    const sSnap=await getDoc(sRef);
    const ex=sSnap.exists()?(sSnap.data().sets||{}):{};
    ex[exName]=exLogs;
    await setDoc(sRef,{day:activeDay,week:weekKey,savedAt:new Date().toISOString(),sets:ex});
    if(maxW&&day.histKey){
      const hRef=doc(db,`users/${currentUser.uid}/history/${day.histKey}`);
      const hSnap=await getDoc(hRef);
      const hData=hSnap.exists()?hSnap.data():{};
      const arr=(hData[exName]||[]).filter(e=>e.date!==today);
      arr.push({date:today,weight:maxW,reps:bestReps});
      arr.sort((a,b)=>parseDate(a.date)-parseDate(b.date));
      hData[exName]=arr.slice(-20);
      await setDoc(hRef,hData);
      injectEntry(day.histKey,exName,today,maxW,bestReps);
    }
    savedExercises.add(exName);
    exSaveStatus[exName]="saved";
    showToast(`✓ ${exName.split(' ').slice(0,2).join(' ')} saved`);
    // Auto-start rest timer
    startTimer();
    setTimeout(()=>{exSaveStatus[exName]="idle";render();},2500);
  }catch(e){exSaveStatus[exName]="idle";showToast("⚠ Save failed",true);console.error(e);}
  render();
}

async function deleteEntryFn(hk,exName,dateStr){
  removeEntry(hk,exName,dateStr);
  if(dateStr===today)savedExercises.delete(exName);
  try{
    const hRef=doc(db,`users/${currentUser.uid}/history/${hk}`);
    const snap=await getDoc(hRef);
    if(snap.exists()){const d=snap.data();if(d[exName]){d[exName]=d[exName].filter(e=>e.date!==dateStr);await setDoc(hRef,d);}}
    if(dateStr===today){
      const sRef=doc(db,`users/${currentUser.uid}/sessions/${weekKey}_${activeDay}`);
      const snap2=await getDoc(sRef);
      if(snap2.exists()){const d=snap2.data();if(d.sets?.[exName]){delete d.sets[exName];delete logs[exName];await setDoc(sRef,d);}}
    }
    showToast("🗑 Entry deleted");
  }catch(e){showToast("⚠ Delete failed",true);}
  render();
}

window.doLogin=async function(){
  const email=document.getElementById("emailIn").value.trim();
  const pass=document.getElementById("passIn").value;
  const btn=document.getElementById("loginBtn");
  const err=document.getElementById("loginErr");
  if(!email||!pass){err.textContent="Please enter email and password.";return;}
  btn.disabled=true;btn.textContent="Signing in...";err.textContent="";
  try{
    await setPersistence(auth,browserLocalPersistence);
    await signInWithEmailAndPassword(auth,email,pass);
  }catch(e){
    btn.disabled=false;btn.textContent="Sign In";
    const m={"auth/invalid-credential":"Wrong email or password.","auth/user-not-found":"No account found.","auth/wrong-password":"Incorrect password.","auth/too-many-requests":"Too many attempts. Try again later."};
    err.textContent=m[e.code]||"Login failed. Try again.";
  }
};

// ── Sparkline ─────────────────────────────────────────────────────────────
function sparklineSVG(data,color){
  const vals=data.map(d=>d.weight).filter(v=>v>0);
  if(vals.length<2)return"";
  const min=Math.min(...vals),max=Math.max(...vals),range=max-min||1;
  const W=64,H=20;
  const pts=vals.map((v,i)=>`${(i/(vals.length-1))*W},${H-((v-min)/range)*(H-4)-2}`).join(" ");
  const[lx,ly]=pts.split(" ").pop().split(",");
  return`<svg width="${W}" height="${H}" style="display:block;flex-shrink:0"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/><circle cx="${lx}" cy="${ly}" r="2.5" fill="${color}"/></svg>`;
}

        const phW=lastEntry?.weight?`${lastEntry.weight}`:"kg";
        const phR=`${repRange}`;

        const rows=Array.from({length:ex.sets}).map((_,si)=>{
          const wv=logs[ex.name]?.[si]?.weight||"";
          const rv=logs[ex.name]?.[si]?.reps||"";
          const nv=logs[ex.name]?.[si]?.note||"";
          const wId=iid(ex.name,si,"w");
          const rId=iid(ex.name,si,"r");
          const nId=iid(ex.name,si,"n");
          const nextWId=si<ex.sets-1?iid(ex.name,si+1,"w"):null;

          if(bw)return`<div style="display:grid;grid-template-columns:${colT};gap:5px;margin-bottom:5px">
            <div style="font-size:11px;color:#3A3A3A;display:flex;align-items:center">${si+1}</div>
            <input id="${rId}" class="set-input" value="${rv}" placeholder="${phR}" inputmode="numeric"
              onchange="setLV('${ex.name}',${si},'reps',this.value)"
              onkeydown="if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();document.getElementById('${nId}')?.focus();}">
            <input id="${nId}" class="set-input" value="${nv}" placeholder="—"
              onchange="setLV('${ex.name}',${si},'note',this.value)">
          </div>`;

          return`<div style="display:grid;grid-template-columns:${colT};gap:5px;margin-bottom:5px">
            <div style="font-size:11px;color:#3A3A3A;display:flex;align-items:center">${si+1}</div>
            <input id="${wId}" class="set-input" value="${wv}" placeholder="${phW}" inputmode="decimal"
              onchange="setLV('${ex.name}',${si},'weight',this.value)"
              onkeydown="autoAdv(event,'${rId}')">
            <input id="${rId}" class="set-input" value="${rv}" placeholder="${phR}" inputmode="numeric"
              onchange="setLV('${ex.name}',${si},'reps',this.value)"
              onkeydown="autoAdv(event,${nextWId?`'${nextWId}'`:'null'})">
            <input id="${nId}" class="set-input" value="${nv}" placeholder="—"
              onchange="setLV('${ex.name}',${si},'note',this.value)">
          </div>`;
        }).join("");

        const btnCls=ss==="saving"?"ex-save-btn saving":ss==="saved"?"ex-save-btn saved":"ex-save-btn";
        const btnTxt=ss==="saving"?"Saving...":ss==="saved"?"✓ Saved":"Save & Start Rest Timer";

        expandedHTML=`<div style="border-top:1px solid #181818">
          <div style="padding:7px 13px;font-size:11px;color:#555;font-style:italic;border-bottom:1px solid #161616">${ex.note}</div>
          ${recentHTML}
          <div style="padding:10px 13px">
            <div style="display:grid;grid-template-columns:${colT};gap:5px;margin-bottom:5px">${hdr}</div>
            ${rows}
            <button class="${btnCls}" onclick="doSaveEx('${ex.name}')" ${ss==="saving"?"disabled":""}>${btnTxt}</button>
          </div>
        </div>`;
      }

      return`<div class="ex-card ${isDone?'done':''}" id="excard_${i}">
        <div class="ex-header" onclick="toggleEx(${i})">
          <div style="width:21px;height:21px;border-radius:5px;background:${isDone?'#1A3A1A':day.color+'20'};border:1px solid ${isDone?'#2A5A2A':day.color+'40'};display:flex;align-items:center;justify-content:center;font-size:9px;color:${isDone?'#4ADE80':day.color};font-weight:700;flex-shrink:0">${isDone?'✓':i+1}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;margin-bottom:3px;${isDone?'color:#666':''}">${ex.name}</div>
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              <span style="font-size:10px;color:${isDone?'#4ADE80':day.color};background:${isDone?'#0A1F0A':day.color+'20'};padding:2px 7px;border-radius:20px;font-weight:600">${ex.sets}×${ex.reps}</span>
              ${weightPill}${bestPill}${doneTag}
            </div>
          </div>
          ${sparkline}
          <div style="color:#2A2A2A;font-size:11px;flex-shrink:0">${expanded?"▲":"▼"}</div>
        </div>
        ${expandedHTML}
      </div>`;
    }).join("");

    const doneCount=[...savedExercises].filter(n=>day.exercises.find(e=>e.name===n)).length;
    const totalCount=day.exercises.filter(e=>!e.bw).length;

    content=`<div style="padding:14px 14px 120px;max-width:860px;margin:0 auto">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <div style="width:3px;height:30px;border-radius:2px;background:${day.color}"></div>
        <div style="flex:1">
          <div style="font-size:9px;color:#555;letter-spacing:2px;text-transform:uppercase">${activeDay}</div>
          <div style="font-size:17px;font-weight:700">${day.focus} Day</div>
        </div>
        <div style="font-size:11px;color:#555">${doneCount}/${totalCount} done</div>
      </div>
      ${cards}
    </div>
    <div id="timerBar" class="timer-bar"></div>`;
  }

  document.getElementById("root").innerHTML=`
    <div style="background:#0F0F0F;border-bottom:1px solid #1A1A1A;padding:14px 20px;display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-size:9px;letter-spacing:3px;color:#444;text-transform:uppercase;margin-bottom:2px">Sanjeeb · Training Log</div>
        <div style="font-size:18px;font-weight:700">Workout Tracker</div>
      </div>
      <button class="signout-btn" onclick="doSignOut()">Sign out</button>
    </div>
    <div class="tab-bar">${tabs}</div>
    ${content}
  `;

  if(!isRest) renderTimer();
}

// ── Global handlers ───────────────────────────────────────────────────────
window.switchDay=async function(d){activeDay=d;expandedEx=null;exSaveStatus={};logs={};savedExercises=new Set();resetTimer();render();await loadDay(d);};
window.toggleEx=function(i){expandedEx=expandedEx===i?null:i;render();};
window.setLV=function(ex,si,f,v){if(!logs[ex])logs[ex]={};if(!logs[ex][si])logs[ex][si]={};logs[ex][si][f]=v;};
window.doSaveEx=function(ex){saveExercise(ex);};
window.doDelete=function(hk,ex,dt){deleteEntryFn(hk,ex,dt);};
window.doSignOut=async function(){await signOut(auth);};
window.autoAdv=function(e,nextId){
  if(e.key==="Enter"||e.key==="Tab"){
    e.preventDefault();
    if(nextId){const el=document.getElementById(nextId);if(el){el.focus();el.select();}}
  }
};


// ── Export for Coach ──────────────────────────────────────────────────────
async function exportForCoach() {
  if (!currentUser) return;
  const lines = [];
  const weekStart = weekKey;
  lines.push("═══════════════════════════════");
  lines.push("WEEKLY LIFT SUMMARY — Coach Export");
  lines.push(`Week of ${weekStart}`);
  lines.push(`Generated: ${todayStr()}`);
  lines.push("═══════════════════════════════");

  const trainingDays = ["Monday","Tuesday","Thursday","Friday"];

  for (const dayName of trainingDays) {
    const day = PLAN[dayName];
    if (!day.histKey) continue;

    try {
      const sessSnap = await getDoc(doc(db, `users/${currentUser.uid}/sessions/${weekKey}_${dayName}`));
      if (!sessSnap.exists()) continue;

      const sets = sessSnap.data().sets || {};
      if (Object.keys(sets).length === 0) continue;

      lines.push("");
      lines.push(`── ${dayName.toUpperCase()} (${day.focus}) ──`);

      for (const ex of day.exercises) {
        const exSets = sets[ex.name];
        if (!exSets || Object.keys(exSets).length === 0) continue;

        const entries = Object.values(exSets);
        const weights = entries.map(s => parseFloat(s.weight)).filter(w => !isNaN(w) && w > 0);
        const reps = entries.map(s => parseInt(s.reps)).filter(r => !isNaN(r) && r > 0);

        if (weights.length === 0) continue;

        const maxW = Math.max(...weights);
        const avgReps = reps.length > 0 ? Math.round(reps.reduce((a,b)=>a+b,0)/reps.length) : '?';
        const setCount = entries.filter(s => parseFloat(s.weight) > 0).length;

        // Get previous best from seed/cache
        const recent = getRecent(day.histKey, ex.name);
        const prevEntries = recent.filter(e => e.date !== todayStr() && !isThisWeek(e.date));
        const prevBest = prevEntries.length > 0 ? prevEntries[prevEntries.length-1] : null;

        let trend = "";
        if (prevBest) {
          if (maxW > prevBest.weight) trend = " ↑ PR";
          else if (maxW < prevBest.weight) trend = " ↓";
          else trend = " =";
        }

        const isSmith = !!ex.smith;
        const sideNote = isSmith ? " /side" : "";
        lines.push(`${ex.name}: ${maxW}kg${sideNote} × ${avgReps} reps (${setCount} sets)${trend}`);
      }
    } catch(e) {
      console.error(`Export error for ${dayName}:`, e);
    }
  }

  lines.push("");
  lines.push("═══════════════════════════════");
  lines.push("Paste this into Claude with your");
  lines.push("Sunday check-in numbers.");
  lines.push("═══════════════════════════════");

  const text = lines.join("\n");

  // Copy to clipboard
  try {
    await navigator.clipboard.writeText(text);
    showToast("✓ Copied to clipboard — paste in Claude");
  } catch(e) {
    // Fallback: show in modal
    window._exportText = text;
    showExportModal(text);
  }
}

function showExportModal(text) {
  const modal = document.createElement('div');
  modal.style.cssText = "position:fixed;inset:0;background:#000000CC;z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;";
  modal.innerHTML = `
    <div style="background:#111;border:1px solid #2A2A2A;border-radius:12px;padding:20px;width:100%;max-width:500px;max-height:80vh;display:flex;flex-direction:column;gap:12px;">
      <div style="font-size:14px;font-weight:700;color:#F0F0F0;">Export for Coach</div>
      <div style="font-size:11px;color:#555;">Select all and copy, then paste into Claude</div>
      <textarea readonly style="background:#0A0A0A;border:1px solid #1E1E1E;border-radius:8px;color:#AAA;font-size:11px;padding:12px;flex:1;min-height:200px;resize:none;font-family:monospace;line-height:1.5;">${text}</textarea>
      <div style="display:flex;gap:8px;">
        <button onclick="navigator.clipboard.writeText(this.closest('div').previousElementSibling.previousElementSibling.previousElementSibling.value).then(()=>showToast('✓ Copied'));this.closest('[style*=fixed]').remove();" style="flex:1;padding:10px;background:#1A3A1A;border:1px solid #2A5A2A;border-radius:8px;color:#4ADE80;font-size:12px;font-weight:600;cursor:pointer;">Copy</button>
        <button onclick="this.closest('[style*=fixed]').remove();" style="padding:10px 16px;background:#1A1A1A;border:1px solid #2A2A2A;border-radius:8px;color:#666;font-size:12px;cursor:pointer;">Close</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

window.exportForCoach = exportForCoach;

// ── Auth ──────────────────────────────────────────────────────────────────
onAuthStateChanged(auth,async user=>{
  if(user){
    currentUser=user;initCache();render();await loadDay(activeDay);
  }else{
    currentUser=null;logs={};recentCache={};exSaveStatus={};expandedEx=null;savedExercises=new Set();renderLogin();
  }
});
</script>
