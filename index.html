<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workout Tracker</title>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif; background: #080808; color: #F0F0F0; }
    input, button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const firebaseConfig = {
      apiKey: "AIzaSyAIXfdxKItrUVJI5m-PB_sK-73ucmWbm9I",
      authDomain: "ragnar9999workouttracker.firebaseapp.com",
      projectId: "ragnar9999workouttracker",
      storageBucket: "ragnar9999workouttracker.firebasestorage.app",
      messagingSenderId: "700941522087",
      appId: "1:700941522087:web:7d26765db39b798960b782"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const PLAN = {
      Monday: {focus:"Push", color:"#E8572A", exercises:[{name:"Incline Smith Machine Press", sets:4, reps:"10", note:"Per-side load shown."}, {name:"Flat Machine Press", sets:3, reps:"12", note:"Seated machine."}, {name:"Cable Fly High→Low", sets:3, reps:"12", note:"Upper chest."}, {name:"Cable Fly Low→High", sets:3, reps:"12", note:"Lower chest."}, {name:"DB Lateral Raise", sets:4, reps:"20", note:"Strict form."}, {name:"Cable Lateral Raise", sets:3, reps:"25", note:"Constant tension."}, {name:"Cable Curl (Straight Bar)", sets:3, reps:"10", note:"Biceps."}, {name:"Bayesian Curl", sets:2, reps:"10", note:"Long head stretch."}, {name:"Hammer Curl", sets:3, reps:"12", note:"Brachialis."}, {name:"Abs (Optional)", sets:3, reps:"15", note:"Core."}]},
      Tuesday: {focus:"Pull", color:"#2A7BE8", exercises:[{name:"Lat Pulldown", sets:4, reps:"12", note:"Width builder."}, {name:"Triangle Cable Row", sets:3, reps:"10", note:"Lat thickness."}, {name:"Wide-Grip Row", sets:3, reps:"10", note:"Upper back."}, {name:"Lat Prayers", sets:3, reps:"12", note:"Pure lat isolation."}, {name:"Rear Delt Fly", sets:3, reps:"25", note:"Rear delt."}, {name:"Face Pull", sets:3, reps:"15", note:"Rotator cuff."}, {name:"Overhead Triceps Extension", sets:3, reps:"12", note:"Triceps."}, {name:"Rope Pushdown", sets:3, reps:"12", note:"Triceps."}, {name:"Cable Crunches", sets:3, reps:"15", note:"Abs."}]},
      Wednesday: {focus:"Rest", color:"#3A3A3A", exercises:[]},
      Thursday: {focus:"Legs", color:"#16A34A", exercises:[{name:"Leg Press", sets:4, reps:"10", note:"Primary compound."}, {name:"DB RDL", sets:3, reps:"10", note:"Hamstrings."}, {name:"Hamstring Curl", sets:3, reps:"12", note:"Hamstrings."}, {name:"Back Extension", sets:3, reps:"12", note:"Lower back."}, {name:"Hip Adduction", sets:3, reps:"15", note:"Adductors."}, {name:"Hip Abduction", sets:3, reps:"15", note:"Abductors."}, {name:"Calf Raises", sets:4, reps:"15", note:"Calves."}]},
      Friday: {focus:"Upper", color:"#9333EA", exercises:[{name:"Incline Smith Machine Press", sets:3, reps:"10", note:"Upper chest."}, {name:"Lat Pulldown", sets:3, reps:"12", note:"V-taper."}, {name:"Wide-Grip Row", sets:3, reps:"10", note:"Upper back."}, {name:"Cable Fly", sets:3, reps:"12", note:"Chest."}, {name:"Shoulder Press", sets:3, reps:"10", note:"Shoulders."}, {name:"Lat Prayers", sets:3, reps:"12", note:"Lats."}, {name:"DB Lateral Raise", sets:3, reps:"15", note:"Side delts."}, {name:"Rear Delt Fly", sets:3, reps:"15", note:"Rear delts."}, {name:"Cable Curl (Straight Bar)", sets:3, reps:"12", note:"Biceps."}, {name:"Hammer Curl", sets:3, reps:"12", note:"Biceps."}, {name:"Overhead Triceps Extension", sets:3, reps:"12", note:"Triceps."}, {name:"Rope Pushdown", sets:3, reps:"12", note:"Triceps."}, {name:"Cable Crunches", sets:3, reps:"15", note:"Abs."}]},
      Saturday: {focus:"Rest", color:"#3A3A3A", exercises:[]},
      Sunday: {focus:"Rest", color:"#3A3A3A", exercises:[]}
    };
    const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

    function Sparkline({data, color}) {
      if(!data || data.length < 2) return null;
      const vals = data.map(d => parseFloat(d.weight)).filter(v => !isNaN(v));
      const min = Math.min(...vals), max = Math.max(...vals), range = (max - min) || 1;
      const W = 72, H = 22;
      const pts = vals.map((v, i) => `${(i / (vals.length - 1)) * W},${H - ((v - min) / range) * (H - 4) - 2}`).join(" ");
      const last = pts.split(" ").pop().split(",");
      return <svg width={W} height={H} style={{display:"block"}}><polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" opacity="0.6"/><circle cx={last[0]} cy={last[1]} r="2.5" fill={color}/></svg>;
    }

    function WorkoutTracker() {
      const [activeDay, setActiveDay] = React.useState("Monday");
      const [logs, setLogs] = React.useState({});
      const [expandedEx, setExpandedEx] = React.useState(null);

      React.useEffect(() => {
        db.collection("workouts").doc("latest").onSnapshot(doc => { if (doc.exists) setLogs(doc.data()); });
      }, []);

      const getWeekKey = () => { const d = new Date(); d.setDate(d.getDate() - d.getDay() + 1); return d.toISOString().split('T')[0]; };

      const setLog = (d, ex, s, f, v) => {
        const week = getWeekKey();
        const newLogs = { ...logs, [d]: { ...logs[d], [ex]: { ...logs[d]?.[ex], [week]: { ...logs[d]?.[ex]?.[week], [s]: { ...logs[d]?.[ex]?.[week]?.[s], [f]: v } } } } };
        setLogs(newLogs);
        db.collection("workouts").doc("latest").set(newLogs);
      };

      const getLog = (d, ex, s, f) => { const week = getWeekKey(); return logs?.[d]?.[ex]?.[week]?.[s]?.[f] || ""; };
      
      const getRecent = (exName) => {
        let history = [];
        DAYS.forEach(d => {
          if(logs[d] && logs[d][exName]) {
            Object.entries(logs[d][exName]).forEach(([key, sets]) => {
              if (key.includes("-")) {
                const maxW = Math.max(...Object.values(sets).map(s => parseFloat(s.weight || 0)));
                if(maxW > 0) history.push({weight: maxW, date: key.slice(5)});
              } else {
                Object.values(sets).forEach(s => { if(s.weight) history.push({weight: parseFloat(s.weight), date: "Old"}); });
              }
            });
          }
        });
        return history.slice(-6);
      };

      const day = PLAN[activeDay];
      return (
        <div style={{fontFamily:"-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif", background:"#080808", minHeight:"100vh", color:"#F0F0F0"}}>
          <div style={{background:"#0F0F0F", borderBottom:"1px solid #1A1A1A", padding:"16px 20px"}}><div style={{fontSize:9, letterSpacing:3, color:"#444", textTransform:"uppercase", marginBottom:3}}>Sanjeeb · Training Log</div><div style={{fontSize:19, fontWeight:700}}>Workout Tracker</div></div>
          <div style={{display:"flex", borderBottom:"1px solid #1A1A1A", background:"#0A0A0A", overflowX:"auto"}}>{DAYS.map(d => { const dp = PLAN[d], active = d === activeDay; return (<button key={d} onClick={() => {setActiveDay(d); setExpandedEx(null);}} style={{background:active?"#111":"transparent", border:"none", borderBottom:active?`2px solid ${dp.color}`:"2px solid transparent", color:active?"#F0F0F0":"#444", padding:"11px 15px", cursor:"pointer", fontSize:11, fontWeight:active?700:400, whiteSpace:"nowrap"}}><div>{d.slice(0,3).toUpperCase()}</div><div style={{fontSize:9, letterSpacing:1, marginTop:2, color:active?dp.color:"#333"}}>{dp.focus.toUpperCase()}</div></button>); })}</div>
          {day.focus === "Rest" ? (<div style={{padding:40, textAlign:"center"}}><div style={{fontSize:36, marginBottom:10}}>💤</div><div style={{color:"#444", fontSize:14}}>Rest day. Recover, eat, sleep.</div></div>) : (
            <div style={{padding:"14px 14px 60px", maxWidth:860, margin:"0 auto"}}>
              <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:14}}><div style={{width:3, height:30, borderRadius:2, background:day.color}}/><div><div style={{fontSize:9, color:"#555", letterSpacing:2, textTransform:"uppercase"}}>{activeDay}</div><div style={{fontSize:17, fontWeight:700}}>{day.focus} Day</div></div></div>
              {day.exercises.map((ex, i) => { const expanded = expandedEx === i, bw = ex.name.includes("Crunch") || ex.name.includes("Abs"), recent = getRecent(ex.name); return (
                <div key={i} style={{marginBottom:8, background:"#111", borderRadius:10, border:"1px solid #1C1C1C", overflow:"hidden"}}>
                  <div onClick={() => setExpandedEx(expanded ? null : i)} style={{padding:"11px 13px", cursor:"pointer", display:"flex", alignItems:"center", gap:10}}><div style={{width:21, height:21, borderRadius:5, background:day.color+"20", border:`1px solid ${day.color}40`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:9, color:day.color, fontWeight:700, flexShrink:0}}>{i+1}</div><div style={{flex:1, minWidth:0}}><div style={{fontSize:13, fontWeight:600, marginBottom:3}}>{ex.name}</div></div>{recent.length > 1 && !bw && <div style={{flexShrink:0}}><Sparkline data={recent} color={day.color}/></div>}<div style={{color:"#2A2A2A", fontSize:11, flexShrink:0}}>{expanded?"▲":"▼"}</div></div>
                  {expanded && (<div style={{borderTop:"1px solid #181818"}}><div style={{padding:"7px 13px", fontSize:11, color:"#555", fontStyle:"italic", borderBottom:"1px solid #161616"}}>{ex.note}</div>{!bw && recent.length > 0 && (<div style={{padding:"10px 13px", borderBottom:"1px solid #161616"}}><div style={{fontSize:9, color:"#3A3A3A", textTransform:"uppercase", letterSpacing:1, marginBottom:6}}>Recent History</div><div style={{display:"flex", gap:5, flexWrap:"wrap"}}>{recent.map((r,j) => (<div key={j} style={{background:"#0A0A0A", border:"1px solid #1E1E1E", borderRadius:6, padding:"4px 8px", textAlign:"center"}}><div style={{fontSize:11, fontWeight:600, color:"#DDD"}}>{r.weight} kg</div><div style={{fontSize:9, color:"#3A3A3A", marginTop:1}}>{r.date}</div></div>))}</div></div>)}
                    <div style={{padding:"10px 13px"}}><div style={{display:"grid", gridTemplateColumns:bw?"28px 1fr 1fr":"28px 1fr 1fr 1fr", gap:5, marginBottom:5}}>{["#", bw?"Reps":"kg", !bw && "Reps", "Note"].map((h,k) => h && <div key={k} style={{fontSize:9, color:"#2A2A2A", textTransform:"uppercase", letterSpacing:1}}>{h}</div>)}</div>
                      {Array.from({length:ex.sets}).map((_,si) => (<div key={si} style={{display:"grid", gridTemplateColumns:bw?"28px 1fr 1fr":"28px 1fr 1fr 1fr", gap:5, marginBottom:5}}><div style={{fontSize:11, color:"#3A3A3A", display:"flex", alignItems:"center"}}>{si+1}</div>{bw ? (<><input value={getLog(activeDay,ex.name,si,"reps")} onChange={e=>setLog(activeDay,ex.name,si,"reps",e.target.value)} placeholder="reps" style={{background:"#0A0A0A", border:"1px solid #1E1E1E", borderRadius:6, color:"#E0E0E0", fontSize:12, padding:"5px 9px", fontFamily:"inherit", width:"100%"}}/><input value={getLog(activeDay,ex.name,si,"note")} onChange={e=>setLog(activeDay,ex.name,si,"note",e.target.value)} placeholder="—" style={{background:"#0A0A0A", border:"1px solid #1E1E1E", borderRadius:6, color:"#E0E0E0", fontSize:12, padding:"5px 9px", fontFamily:"inherit", width:"100%"}}/></>) : (<><input value={getLog(activeDay,ex.name,si,"weight")} onChange={e=>setLog(activeDay,ex.name,si,"weight",e.target.value)} placeholder="kg" style={{background:"#0A0A0A", border:"1px solid #1E1E1E", borderRadius:6, color:"#E0E0E0", fontSize:12, padding:"5px 9px", fontFamily:"inherit", width:"100%"}}/><input value={getLog(activeDay,ex.name,si,"reps")} onChange={e=>setLog(activeDay,ex.name,si,"reps",e.target.value)} placeholder={ex.reps} style={{background:"#0A0A0A", border:"1px solid #1E1E1E", borderRadius:6, color:"#E0E0E0", fontSize:12, padding:"5px 9px", fontFamily:"inherit", width:"100%"}}/><input value={getLog(activeDay,ex.name,si,"note")} onChange={e=>setLog(activeDay,ex.name,si,"note",e.target.value)} placeholder="—" style={{background:"#0A0A0A", border:"1px solid #1E1E1E", borderRadius:6, color:"#E0E0E0", fontSize:12, padding:"5px 9px", fontFamily:"inherit", width:"100%"}}/></>)}</div>))}
                    </div>
                  </div>)}
                </div>
              ); })}
            </div>
          )}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<WorkoutTracker />);
  </script>
</body>
</html>
