<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Workout Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#080808;color:#F0F0F0;overscroll-behavior:none;}
input,button,textarea{font-family:inherit;}input{outline:none;}
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.lc{background:#111;border:1px solid #1E1E1E;border-radius:16px;padding:32px 24px;width:100%;max-width:340px;}
.ll{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.li{width:100%;background:#0A0A0A;border:1px solid #1E1E1E;border-radius:8px;color:#F0F0F0;font-size:15px;padding:11px 14px;margin-bottom:12px;}
.li:focus{border-color:#333;}
.lb{width:100%;padding:13px;background:#E8572A;border:none;border-radius:8px;color:#FFF;font-size:14px;font-weight:700;cursor:pointer;}
.lb:disabled{opacity:0.5;}
.le{font-size:12px;color:#F87171;margin-top:8px;text-align:center;min-height:16px;}
.tabs{display:flex;background:#0A0A0A;border-bottom:1px solid #1A1A1A;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{background:transparent;border:none;border-bottom:2px solid transparent;color:#3A3A3A;padding:10px 14px;cursor:pointer;font-size:11px;white-space:nowrap;}
.tab.on{background:#111;color:#F0F0F0;font-weight:700;}
.card{margin-bottom:6px;background:#111;border-radius:10px;border:1px solid #1C1C1C;overflow:hidden;transition:border-color 0.2s;}
.card.done{border-color:#163316;}
.ch{padding:11px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none;}
.sg{display:grid;gap:6px;margin-bottom:6px;align-items:center;}
.si{background:#0D0D0D;border:1px solid #1E1E1E;border-radius:8px;color:#F0F0F0;font-size:16px;font-weight:600;padding:10px 12px;width:100%;text-align:center;transition:border-color 0.2s,background 0.2s;}
.si:focus{border-color:#333;background:#111;}
.si::placeholder{color:#1E1E1E;font-weight:400;font-size:13px;}
.si.pr{border-color:#16A34A;background:#0A150A;}
.si.ok{border-color:#1A3A1A;}
.si.lo{border-color:#7A3A0A;background:#120D08;}
.sv{width:100%;padding:11px;background:#0F0F0F;border:1px solid #1A1A1A;border-radius:8px;color:#444;font-size:12px;font-weight:600;cursor:pointer;margin-top:8px;transition:all 0.2s;}
.sv:hover{background:#161616;color:#777;}
.sv.go{background:#0A1A0A;border-color:#1A3A1A;color:#4ADE80;}
.sv.spin{color:#222;pointer-events:none;}
.xb{background:none;border:none;color:#222;cursor:pointer;font-size:11px;padding:2px 4px;border-radius:3px;line-height:1;}
.xb:hover{color:#EF4444;}
.so{background:none;border:1px solid #1A1A1A;border-radius:6px;color:#3A3A3A;font-size:10px;padding:4px 10px;cursor:pointer;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A3A1A;border:1px solid #2A5A2A;color:#4ADE80;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transition:opacity 0.25s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.on{opacity:1;}
.toast.err{background:#3A1A1A;border-color:#5A2A2A;color:#F87171;}
.drag-handle{color:#252525;cursor:grab;padding:0 8px 0 2px;font-size:18px;flex-shrink:0;touch-action:none;user-select:none;-webkit-user-select:none;}
.drag-handle:active{color:#555;}
.card.drag-over{border-color:#555;background:#161616;}
/* AI Panel */
.ai-panel{background:#0C0C14;border:1px solid #1A1A2A;border-radius:12px;padding:16px;margin-bottom:14px;}
.ai-panel.loading{opacity:0.7;}
.ai-heading{font-size:10px;color:#4A4A7A;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.ai-text{font-size:13px;color:#C0C0D8;line-height:1.65;}
.ai-text strong{color:#E0E0FF;}
.ai-text .good{color:#4ADE80;}
.ai-text .warn{color:#FFB800;}
.ai-text .bad{color:#F87171;}
.ai-btn{padding:10px 16px;background:#0A0A1A;border:1px solid #1A1A3A;border-radius:8px;color:#6A7AEF;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.2s;}
.ai-btn:hover{background:#111128;border-color:#2A2A5A;}
.ai-btn:disabled{opacity:0.4;pointer-events:none;}
.ai-btn.full{width:100%;justify-content:center;margin-top:10px;padding:13px;}
.pulse{animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;display:flex;align-items:flex-end;justify-content:center;padding:0;}
.modal-sheet{background:#0F0F0F;border-radius:16px 16px 0 0;border:1px solid #1A1A1A;padding:20px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:4px;}
.modal-sub{font-size:11px;color:#444;margin-bottom:16px;}
</style>

<script type="module">

const FB={apiKey:"AIzaSyAIXfdxKItrUVJI5m-PB_sK-73ucmWbm9I",authDomain:"ragnar9999workouttracker.firebaseapp.com",projectId:"ragnar9999workouttracker",storageBucket:"ragnar9999workouttracker.firebasestorage.app",messagingSenderId:"700941522087",appId:"1:700941522087:web:7d26765db39b798960b782"};

// ── Utils ─────────────────────────────────────────────────────────────────
const weekKey=(()=>{const d=new Date(),dy=d.getDay();const m=new Date(d);m.setDate(d.getDate()-(dy===0?6:dy-1));return m.toISOString().slice(0,10);})();
const todayStr=(()=>{const d=new Date();return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;})();
function parseDate(s){const[d,m,y]=s.split('/');return new Date(+y,+m-1,+d);}
function isThisWeek(s){const e=parseDate(s),m=new Date(weekKey),su=new Date(m);su.setDate(m.getDate()+6);return e>=m&&e<=su;}
function toast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.className='toast on'+(err?' err':'');setTimeout(()=>t.className='toast',2500);}
function upath(p){return`users/${user.uid}/${p}`;}

// ── Plan ──────────────────────────────────────────────────────────────────
const PLAN={
  Monday:{focus:'Push',color:'#E8572A',hk:'Push',exercises:[
    {n:'Incline Smith Machine Press',s:4,t:8,note:'Per-side load — total ×2. Upper chest. Heaviest first.',smith:true},
    {n:'Flat Machine Press',s:3,t:10,note:'Mid chest compound.'},
    {n:'Cable Fly High→Low',s:3,t:12,note:'Both hands. Upper chest stretch and squeeze.'},

  Tuesday:{focus:'Pull',color:'#2A7BE8',hk:'Pull',exercises:[

    {n:'Wide-Grip Row',s:3,t:10,note:'Upper back and rhomboids. Squeeze at top.'},

  Thursday:{focus:'Legs',color:'#D97706',hk:'Legs',exercises:[

    {n:'Incline Smith Machine Press',s:3,t:10,note:'Chest compound first. Per-side load ×2.',smith:true},
    {n:'Shoulder Press',s:4,t:8,note:'Shoulders after chest — deltoids still fresh.'},
    {n:'Cable Fly High→Low',s:2,t:12,note:'Chest second hit. Upper chest squeeze.'},
    {n:'Cable Fly Low→High',s:2,t:12,note:'Lower chest. Control the stretch.'},
    {n:'Lat Pulldown',s:3,t:10,note:'V-taper. Second session. Push past 75kg.'},
    {n:'Wide-Grip Row',s:3,t:10,note:'Upper back. Second session.'},
    {n:'Cable Lateral Raise',s:3,t:15,note:'Strict. Slow. Shoulder width.'},
    {n:'Rear Delt Fly',s:3,t:15,note:'Balance front and rear delt.'},
    {n:'Cable Curl (Straight Bar)',s:3,t:10,note:'Biceps second session.'},
    {n:'Hammer Curl',s:2,t:10,note:'Brachialis.'},
    {n:'Rope Pushdown',s:3,t:12,note:'Triceps finisher. Single handed.'},

  ]},
  Saturday:{focus:'Rest',color:'#2A2A2A',hk:null,exercises:[]},

};
const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

const INCREMENT={'Incline Smith Machine Press':2.5,'Flat Machine Press':2.5,'Shoulder Press':2.5,'Barbell RDL':2.5,'Leg Press':5,'Cable Fly High→Low':1,'Cable Fly Low→High':1,'Cable Lateral Raise':1,'Cable Curl (Straight Bar)':1,'Bayesian Curl':1,'Hammer Curl':1,'Lat Pulldown':1,'Triangle Cable Row':2,'Wide-Grip Row':2,'Single Arm Cable Pulldown':2,'Rear Delt Fly':1,'Overhead Triceps Extension':2,'Rope Pushdown':1,'Hamstring Curl':2,'Back Extension':2,'Hip Adduction':2,'Hip Abduction':2,'Calf Raises':2};

const BEST_SEED={'Incline Smith Machine Press':{w:25,r:10},'Flat Machine Press':{w:59,r:12},'Cable Fly High→Low':{w:23,r:12},'Cable Fly Low→High':{w:23,r:12},'Cable Lateral Raise':{w:23,r:15},'Cable Curl (Straight Bar)':{w:58,r:12},'Bayesian Curl':{w:29,r:12},'Hammer Curl':{w:61,r:12},'Lat Pulldown':{w:75,r:8},'Triangle Cable Row':{w:68,r:9},'Wide-Grip Row':{w:55,r:11},'Rear Delt Fly':{w:32,r:15},'Overhead Triceps Extension':{w:54,r:12},'Rope Pushdown':{w:27,r:12},'Barbell RDL':{w:100,r:5},'Leg Press':{w:250,r:10},'Hamstring Curl':{w:73,r:12},'Back Extension':{w:25,r:12},'Hip Adduction':{w:79,r:15},'Hip Abduction':{w:95,r:15},'Calf Raises':{w:141,r:13},'Shoulder Press':{w:43,r:8},'Single Arm Cable Pulldown':{w:0,r:0}};

const SEED_H={"Push":{"Incline Smith Machine Press":[{"date":"15/06/2026","weight":23,"reps":10},{"date":"22/06/2026","weight":22,"reps":10},{"date":"30/06/2026","weight":23,"reps":7},{"date":"04/07/2026","weight":23,"reps":10}],"Flat Machine Press":[{"date":"15/06/2026","weight":52,"reps":12},{"date":"22/06/2026","weight":59,"reps":12},{"date":"30/06/2026","weight":59,"reps":11},{"date":"04/07/2026","weight":59,"reps":12}],"Cable Fly High→Low":[{"date":"22/06/2026","weight":23,"reps":12},{"date":"30/06/2026","weight":23,"reps":9},{"date":"04/07/2026","weight":23,"reps":12}],"Cable Fly Low→High":[{"date":"22/06/2026","weight":23,"reps":12},{"date":"30/06/2026","weight":23,"reps":10},{"date":"04/07/2026","weight":23,"reps":12}],"Cable Lateral Raise":[{"date":"22/06/2026","weight":23,"reps":15},{"date":"30/06/2026","weight":18,"reps":14},{"date":"04/07/2026","weight":18,"reps":15}],"Cable Curl (Straight Bar)":[{"date":"15/06/2026","weight":56,"reps":12},{"date":"22/06/2026","weight":56,"reps":12},{"date":"30/06/2026","weight":58,"reps":10},{"date":"04/07/2026","weight":58,"reps":10}],"Bayesian Curl":[{"date":"22/06/2026","weight":23,"reps":12},{"date":"30/06/2026","weight":27,"reps":11},{"date":"04/07/2026","weight":27,"reps":12}],"Hammer Curl":[{"date":"22/06/2026","weight":56,"reps":12},{"date":"30/06/2026","weight":59,"reps":12},{"date":"04/07/2026","weight":59,"reps":12}]},"Pull":{"Lat Pulldown":[{"date":"16/06/2026","weight":73,"reps":12},{"date":"01/07/2026","weight":75,"reps":8},{"date":"08/07/2026","weight":75,"reps":8}],"Wide-Grip Row":[{"date":"16/06/2026","weight":28,"reps":10},{"date":"01/07/2026","weight":52,"reps":12},{"date":"08/07/2026","weight":52,"reps":9}],"Triangle Cable Row":[{"date":"16/06/2026","weight":66,"reps":10},{"date":"01/07/2026","weight":68,"reps":9},{"date":"08/07/2026","weight":68,"reps":8}],"Rear Delt Fly":[{"date":"01/07/2026","weight":18,"reps":10},{"date":"08/07/2026","weight":18,"reps":10}],"Overhead Triceps Extension":[{"date":"16/06/2026","weight":52,"reps":12},{"date":"01/07/2026","weight":54,"reps":12},{"date":"08/07/2026","weight":54,"reps":12}],"Rope Pushdown":[{"date":"16/06/2026","weight":20,"reps":12},{"date":"01/07/2026","weight":25,"reps":9},{"date":"08/07/2026","weight":25,"reps":8}]},"Legs":{"Barbell RDL":[{"date":"03/07/2026","weight":90,"reps":9},{"date":"10/07/2026","weight":90,"reps":9}],"Leg Press":[{"date":"28/05/2026","weight":250,"reps":10},{"date":"03/07/2026","weight":250,"reps":10},{"date":"10/07/2026","weight":250,"reps":10}],"Hamstring Curl":[{"date":"03/07/2026","weight":59,"reps":9},{"date":"10/07/2026","weight":59,"reps":10}],"Back Extension":[{"date":"03/07/2026","weight":25,"reps":12},{"date":"10/07/2026","weight":25,"reps":12}],"Hip Adduction":[{"date":"03/07/2026","weight":79,"reps":12},{"date":"10/07/2026","weight":79,"reps":12}],"Hip Abduction":[{"date":"03/07/2026","weight":95,"reps":15},{"date":"10/07/2026","weight":95,"reps":15}],"Calf Raises":[{"date":"03/07/2026","weight":141,"reps":10},{"date":"10/07/2026","weight":141,"reps":13}]},"Upper":{"Incline Smith Machine Press":[{"date":"04/07/2026","weight":23,"reps":10}],"Shoulder Press":[{"date":"04/07/2026","weight":43,"reps":8}],"Cable Fly High→Low":[{"date":"04/07/2026","weight":23,"reps":12}],"Cable Fly Low→High":[{"date":"04/07/2026","weight":23,"reps":10}],"Lat Pulldown":[{"date":"04/07/2026","weight":75,"reps":8}],"Wide-Grip Row":[{"date":"04/07/2026","weight":55,"reps":11}],"Cable Lateral Raise":[{"date":"04/07/2026","weight":18,"reps":13}],"Rear Delt Fly":[{"date":"04/07/2026","weight":20,"reps":9}],"Cable Curl (Straight Bar)":[{"date":"04/07/2026","weight":59,"reps":8}],"Hammer Curl":[{"date":"04/07/2026","weight":61,"reps":12}],"Rope Pushdown":[{"date":"04/07/2026","weight":25,"reps":8}]}};

// ── State ─────────────────────────────────────────────────────────────────
let activeDay=(()=>{const d=new Date().getDay();return DAYS[d===0?6:d-1];})();
let logs={};let cache={};let globalCache={};let saveStatus={};let done=new Set();let openEx=null;
let exerciseOrder={};let touchDragIdx=null;let touchClone=null;let touchCards=[];let dragSrc=null;
let aiPreview=null;let aiSummary=null;let aiLoading=false;

// ── Cache ─────────────────────────────────────────────────────────────────
function ck(hk,n){return hk+'__'+n;}
function initCache(){
  for(const[dk,em]of Object.entries(SEED_H))for(const[n,arr]of Object.entries(em)){
    cache[ck(dk,n)]=[...arr];
    if(!globalCache[n])globalCache[n]=[];
    for(const e of arr){const ex=globalCache[n].find(x=>x.date===e.date);if(!ex)globalCache[n].push({...e});else if(e.weight>ex.weight){ex.weight=e.weight;ex.reps=e.reps;}}
  }
  for(const n of Object.keys(globalCache))globalCache[n].sort((a,b)=>parseDate(a.date)-parseDate(b.date));
}
function getH(hk,n){return cache[ck(hk,n)]||[];}
function inject(hk,n,date,w,r){
  const k=ck(hk,n);if(!cache[k])cache[k]=[];
  cache[k]=cache[k].filter(e=>e.date!==date);cache[k].push({date,weight:w,reps:r});
  cache[k].sort((a,b)=>parseDate(a.date)-parseDate(b.date));if(cache[k].length>10)cache[k]=cache[k].slice(-10);
  if(!globalCache[n])globalCache[n]=[];
  globalCache[n]=globalCache[n].filter(e=>e.date!==date);globalCache[n].push({date,weight:w,reps:r});
  globalCache[n].sort((a,b)=>parseDate(a.date)-parseDate(b.date));if(globalCache[n].length>20)globalCache[n]=globalCache[n].slice(-20);
}
function removeH(hk,n,date){const k=ck(hk,n);if(cache[k])cache[k]=cache[k].filter(e=>e.date!==date);if(globalCache[n])globalCache[n]=globalCache[n].filter(e=>e.date!==date);}
function getGlobalBest(n){const seed=BEST_SEED[n];let best=seed&&seed.w>0?{w:seed.w,r:seed.r}:null;for(const e of(globalCache[n]||[])){if(!best||e.weight>best.w||(e.weight===best.w&&(e.reps||0)>(best.r||0)))best={w:e.weight,r:e.reps||0};}return best;}
function getGlobalLast(n){const g=globalCache[n]||[];return g.length>0?g[g.length-1]:null;}
function getWeekBest(n){const tw=(globalCache[n]||[]).filter(e=>isThisWeek(e.date));return tw.length>0?tw.reduce((b,e)=>e.weight>b.weight?e:b):null;}
function getTarget(exName,targetReps){if(targetReps===0)return null;const last=getGlobalLast(exName);if(!last)return null;const inc=INCREMENT[exName]||1;if((last.reps||0)>=targetReps)return{w:last.weight+inc,ready:true};return{w:last.weight,ready:false};}

// ── Order ─────────────────────────────────────────────────────────────────
function getOrder(d){if(!exerciseOrder[d])exerciseOrder[d]=PLAN[d].exercises.map((_,i)=>i);return exerciseOrder[d];}
function getOrderedExercises(d){return getOrder(d).map(i=>PLAN[d].exercises[i]);}

// ── AI ────────────────────────────────────────────────────────────────────
async function callClaude(prompt){
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:prompt}]})
  });
  const data=await res.json();
  return data.content?.[0]?.text||'';
}

function buildSessionContext(){
  const day=PLAN[activeDay];
  const orderedEx=getOrderedExercises(activeDay);
  const sessionData=orderedEx.map(ex=>{
    const exLogs=logs[ex.n]||{};
    const vals=Object.values(exLogs).filter(v=>typeof v==='object'&&(v.w||v.weight));
    const ws=vals.map(s=>parseFloat(s.w||s.weight)).filter(w=>!isNaN(w)&&w>0);
    const rs=vals.map(s=>parseInt(s.r||s.reps)).filter(r=>!isNaN(r)&&r>0);
    const last=getGlobalLast(ex.n);
    const best=getGlobalBest(ex.n);
    return{name:ex.n,target:`${ex.s}×${ex.t||'protocol'}`,logged:ws.length>0,maxW:ws.length?Math.max(...ws):null,avgR:rs.length?Math.round(rs.reduce((a,b)=>a+b)/rs.length):null,last:last?`${last.weight}kg×${last.reps}`:null,best:best?`${best.w}kg×${best.r}`:null};
  }).filter(e=>!e.name.includes('Crunches')&&!e.name.includes('Raises')||e.logged);
  return sessionData;
}

async function loadAIPreview(){
  if(aiLoading||aiPreview)return;
  aiLoading=true;render();
  const day=PLAN[activeDay];
  const orderedEx=getOrderedExercises(activeDay);
  const exList=orderedEx.map(ex=>{
    const last=getGlobalLast(ex.n);
    const target=getTarget(ex.n,ex.t);

async function saveEx(exName){
  if(!user)return;

  const ws=vals.map(s=>parseFloat(s.w||s.weight)).filter(w=>!isNaN(w)&&w>0);
  const maxW=ws.length>0?Math.max(...ws):null;
  let bestR=0;if(maxW)for(const s of vals){if(parseFloat(s.w||s.weight)===maxW){const r=parseInt(s.r||s.reps)||0;if(r>bestR)bestR=r;}}

    ex[exName]=el;await setDoc(sRef,{day:activeDay,week:weekKey,savedAt:new Date().toISOString(),sets:ex});

      const hRef=doc(db,upath(`history/${day.hk}`));const hSnap=await getDoc(hRef);const hd=hSnap.exists()?hSnap.data():{};
      const arr=(hd[exName]||[]).filter(e=>e.date!==todayStr);arr.push({date:todayStr,weight:maxW,reps:bestR});

// ── Sparkline ─────────────────────────────────────────────────────────────
function spark(data,color){
  const v=data.map(d=>d.weight).filter(x=>x>0);if(v.length<2)return'';
  const mn=Math.min(...v),mx=Math.max(...v),rng=mx-mn||1;const W=52,H=18;
  const pts=v.map((x,i)=>`${(i/(v.length-1))*W},${H-((x-mn)/rng)*(H-3)-1.5}`).join(' ');
  const[lx,ly]=pts.split(' ').pop().split(',');
  return`<svg width="${W}" height="${H}" style="display:block;flex-shrink:0"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/><circle cx="${lx}" cy="${ly}" r="2.5" fill="${color}"/></svg>`;
}

window.touchDragStart=function(e,i){
  e.stopPropagation();touchDragIdx=i;dragSrc=i;
  const srcCard=document.getElementById('excard_'+i);if(!srcCard)return;

  document.body.appendChild(touchClone);srcCard.style.opacity='0.3';
  document.addEventListener('touchmove',touchDragMove,{passive:false});
  document.addEventListener('touchend',window.touchDragEnd);
};
function touchDragMove(e){if(touchDragIdx===null)return;e.preventDefault();const y=e.touches[0].clientY;if(touchClone)touchClone.style.top=(y-40)+'px';touchCards.forEach((c,idx)=>{const rect=c.getBoundingClientRect();if(y>=rect.top&&y<=rect.bottom&&idx!==touchDragIdx)c.classList.add('drag-over');else c.classList.remove('drag-over');});}
window.touchDragEnd=function(e){
  document.removeEventListener('touchmove',touchDragMove);document.removeEventListener('touchend',window.touchDragEnd);
  if(touchClone){touchClone.remove();touchClone=null;}
  const srcCard=document.getElementById('excard_'+touchDragIdx);if(srcCard)srcCard.style.opacity='';
  if(e&&e.changedTouches){
    const y=e.changedTouches[0].clientY;let targetIdx=null;
    touchCards.forEach((c,idx)=>{const rect=c.getBoundingClientRect();if(y>=rect.top&&y<=rect.bottom&&idx!==touchDragIdx)targetIdx=idx;c.classList.remove('drag-over');});
    if(targetIdx!==null&&targetIdx!==touchDragIdx){

};

          <span class="drag-handle" ontouchstart="touchDragStart(event,${i})" ontouchend="touchDragEnd(event)">⠿</span>
          <div style="flex:1;display:flex;align-items:center;gap:8px;cursor:pointer;min-width:0" onclick="tog(${i})">
            <div style="width:20px;height:20px;border-radius:5px;background:${isDone?'#163316':day.color+'18'};border:1px solid ${isDone?'#1A4A1A':day.color+'33'};display:flex;align-items:center;justify-content:center;font-size:9px;color:${isDone?'#4ADE80':day.color};font-weight:700;flex-shrink:0">${isDone?'✓':i+1}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:600;margin-bottom:2px;${isDone?'color:#555':''}">${ex.n}</div>
              <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
                <span style="font-size:10px;color:${isDone?'#4ADE80':day.color};background:${isDone?'#0A1A0A':day.color+'18'};padding:1px 7px;border-radius:12px;font-weight:600">${repLabel}</span>
                ${wPill}${bPill}${doneBadge}${targetBadge}
              </div>
            </div>
            ${sp}
            <div style="color:#1E1E1E;font-size:10px;flex-shrink:0">${isOpen?'▲':'▼'}</div>
          </div>
        </div>
        ${body}
      </div>`;
    }).join('');

    // AI Summary panel
    let aiSumHTML='';
    if(aiSummary){
      const formatted=aiSummary.split('\n').filter(l=>l.trim()).map(l=>{const clean=l.replace(/^•\s*/,'');return`<div style="display:flex;gap:8px;margin-bottom:8px"><span style="color:${day.color};flex-shrink:0;margin-top:2px">▸</span><span>${clean}</span></div>`;}).join('');
      aiSumHTML=`<div class="ai-panel" style="margin-top:10px">
        <div class="ai-heading">🏁 Session Analysis</div>
        <div class="ai-text">${formatted}</div>
        <button class="ai-btn" style="margin-top:10px;font-size:11px" onclick="doAISummary()">↺ Refresh</button>
      </div>`;
    } else {
      aiSumHTML=`<div style="margin-top:10px">
        <button class="ai-btn full ${aiLoading?'pulse':''}" onclick="doAISummary()" ${aiLoading?'disabled':''}>
          ${aiLoading?'⏳ Analysing...':'🏁 Analyse My Session'}
        </button>
      </div>`;
    }

    content=`<div style="padding:12px 12px 40px;max-width:800px;margin:0 auto">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <div style="width:3px;height:26px;border-radius:2px;background:${day.color}"></div>
        <div style="flex:1"><div style="font-size:9px;color:#444;letter-spacing:2px;text-transform:uppercase">${activeDay}</div><div style="font-size:16px;font-weight:700">${day.focus} Day</div></div>
        <div style="font-size:10px;color:#333">${doneCnt}/${totCnt}</div>
      </div>
      ${aiPanelHTML}
      ${cards}
      ${aiSumHTML}
    </div>`;
  }

  document.getElementById('root').innerHTML=`
    <div style="background:#0C0C0C;border-bottom:1px solid #161616;padding:12px 16px;display:flex;align-items:center;justify-content:space-between">
      <div><div style="font-size:8px;letter-spacing:3px;color:#333;text-transform:uppercase;margin-bottom:1px">Training Log</div><div style="font-size:17px;font-weight:700">Workout Tracker</div></div>
      <button class="so" onclick="doSO()">Sign out</button>
    </div>
    <div class="tabs">${tabs}</div>
    ${content}`;

  if(openEx!==null&&!isRest){
    const ex=getOrderedExercises(activeDay)[openEx];
    if(ex){const firstId=ex.bw?iid(ex.n,0,'r'):iid(ex.n,0,'w');setTimeout(()=>{const el=document.getElementById(firstId);if(el&&!el.value)el.focus();},60);}
  }
}

// ── Handlers ──────────────────────────────────────────────────────────────
window.sw=async function(d){activeDay=d;openEx=null;saveStatus={};logs={};done=new Set();aiPreview=null;aiSummary=null;aiLoading=false;render();await loadDay(d);};
window.tog=function(i){openEx=openEx===i?null:i;render();};
window.setLV=function(n,si,f,v){if(!logs[n])logs[n]={};if(!logs[n][si])logs[n][si]={};logs[n][si][f]=v;};
window.doSave=function(n){saveEx(n);};
window.doDel=function(hk,n,d){delEntry(hk,n,d);};
window.doSO=async function(){await signOut(auth);};
window.adv=function(e,nextId){if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();if(nextId){const el=document.getElementById(nextId);if(el){el.focus();el.select();}}}};
window.updCls=function(n,si,id){const val=logs[n]?.[si]?.w;const el=document.getElementById(id);if(!el)return;const cls=inputCls(n,val);el.className='si'+(cls?' '+cls:'');};
window.doAIPreview=function(){loadAIPreview();};
window.doAISummary=function(){aiSummary=null;loadAISummary();};

// ── Auth ──────────────────────────────────────────────────────────────────
onAuthStateChanged(auth,async u=>{
  if(u){user=u;initCache();render();await loadDay(activeDay);}
  else{user=null;logs={};cache={};globalCache={};saveStatus={};openEx=null;done=new Set();renderLogin();}
});
</script>
</body>
</html>
