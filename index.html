<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Workout Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#080808;color:#F0F0F0;overscroll-behavior:none;}
input,button,textarea{font-family:inherit;}
input{outline:none;}

.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.lc{background:#111;border:1px solid #1E1E1E;border-radius:16px;padding:32px 24px;width:100%;max-width:340px;}
.ll{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.li{width:100%;background:#0A0A0A;border:1px solid #1E1E1E;border-radius:8px;color:#F0F0F0;font-size:15px;padding:11px 14px;margin-bottom:12px;}
.li:focus{border-color:#333;}
.lb{width:100%;padding:13px;background:#E8572A;border:none;border-radius:8px;color:#FFF;font-size:14px;font-weight:700;cursor:pointer;}
.lb:disabled{opacity:0.5;}
.le{font-size:12px;color:#F87171;margin-top:8px;text-align:center;min-height:16px;}

.tabs{display:flex;background:#0A0A0A;border-bottom:1px solid #1A1A1A;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{background:transparent;border:none;border-bottom:2px solid transparent;color:#3A3A3A;padding:10px 14px;cursor:pointer;font-size:11px;white-space:nowrap;}
.tab.on{background:#111;color:#F0F0F0;font-weight:700;}

.card{margin-bottom:6px;background:#111;border-radius:10px;border:1px solid #1C1C1C;overflow:hidden;transition:border-color 0.2s;}
.card.done{border-color:#163316;}
.ch{padding:12px 13px;cursor:pointer;display:flex;align-items:center;gap:10px;user-select:none;}

.sg{display:grid;gap:6px;margin-bottom:6px;align-items:center;}
.si{background:#0D0D0D;border:1px solid #1E1E1E;border-radius:8px;color:#F0F0F0;font-size:16px;font-weight:600;padding:10px 12px;width:100%;text-align:center;transition:border-color 0.2s,background 0.2s;}
.si:focus{border-color:#333;background:#111;}
.si::placeholder{color:#1E1E1E;font-weight:400;font-size:13px;}
.si.pr{border-color:#16A34A;background:#0A150A;}
.si.ok{border-color:#1A3A1A;}
.si.lo{border-color:#7A3A0A;background:#120D08;}

.sv{width:100%;padding:12px;background:#0F0F0F;border:1px solid #1A1A1A;border-radius:8px;color:#444;font-size:12px;font-weight:600;cursor:pointer;margin-top:8px;transition:all 0.2s;}
.sv:hover{background:#161616;color:#777;}
.sv.go{background:#0A1A0A;border-color:#1A3A1A;color:#4ADE80;}
.sv.spin{color:#222;pointer-events:none;}

.xb{background:none;border:none;color:#222;cursor:pointer;font-size:11px;padding:2px 4px;border-radius:3px;line-height:1;}
.xb:hover{color:#EF4444;}
.so{background:none;border:1px solid #1A1A1A;border-radius:6px;color:#3A3A3A;font-size:10px;padding:4px 10px;cursor:pointer;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A3A1A;border:1px solid #2A5A2A;color:#4ADE80;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transition:opacity 0.25s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.on{opacity:1;}
.toast.err{background:#3A1A1A;border-color:#5A2A2A;color:#F87171;}
</style>
</head>

// ── State ─────────────────────────────────────────────────────────────────
let activeDay=(()=>{const d=new Date().getDay();return DAYS[d===0?6:d-1];})();
let logs={};
let cache={};      // keyed by hk__exName for history
let globalCache={}; // keyed by exName only — for global best
let saveStatus={};
let done=new Set();
let openEx=null;

// ── Cache ops ─────────────────────────────────────────────────────────────
function ck(hk,n){return hk+'__'+n;}

function initCache(){
  for(const[dk,em]of Object.entries(SEED_H))
    for(const[n,arr]of Object.entries(em)){
      // Day-specific cache (for history display per day)
      cache[ck(dk,n)]=[...arr];
      // Global cache — merge ALL entries for this exercise name across all day sheets
      if(!globalCache[n]) globalCache[n]=[];
      for(const e of arr){
        // Only add if this date isn't already present, or if this weight is higher
        const existing=globalCache[n].find(x=>x.date===e.date);
        if(!existing) globalCache[n].push({...e});
        else if(e.weight>existing.weight){ existing.weight=e.weight; existing.reps=e.reps; }
      }
    }
  // Sort all global caches by date
  for(const n of Object.keys(globalCache))
    globalCache[n].sort((a,b)=>parseDate(a.date)-parseDate(b.date));
}

function inject(hk,n,date,w,r){
  // Inject into day-specific cache
  const k=ck(hk,n);
  if(!cache[k])cache[k]=[];
  cache[k]=cache[k].filter(e=>e.date!==date);
  cache[k].push({date,weight:w,reps:r});
  cache[k].sort((a,b)=>parseDate(a.date)-parseDate(b.date));
  if(cache[k].length>10)cache[k]=cache[k].slice(-10);
  // Inject into global cache — keep highest weight if same date exists
  if(!globalCache[n])globalCache[n]=[];
  const existing=globalCache[n].find(e=>e.date===date);
  if(existing){if(w>=existing.weight){existing.weight=w;existing.reps=r;}}
  else{globalCache[n].push({date,weight:w,reps:r});}
  globalCache[n].sort((a,b)=>parseDate(a.date)-parseDate(b.date));
  if(globalCache[n].length>20)globalCache[n]=globalCache[n].slice(-20);
}

function removeH(hk,n,date){
  const k=ck(hk,n);
  if(cache[k])cache[k]=cache[k].filter(e=>e.date!==date);
  if(globalCache[n])globalCache[n]=globalCache[n].filter(e=>e.date!==date);
}

// ── Global best — uses exercise name only, across all days ────────────────
function getGlobalBest(n){
  const seed=BEST_SEED[n];
  let best=seed?{w:seed.w,r:seed.r,score:seed.w*seed.r}:null;
  for(const e of(globalCache[n]||[])){
    const sc=e.weight*(e.reps||1);
    if(!best||sc>best.score)best={w:e.weight,r:e.reps||0,score:sc};
  }
  return best;
}

function getGlobalLast(n){
  const g=globalCache[n]||[];
  return g.length>0?g[g.length-1]:null;
}

function getWeekBest(n){
  const tw=(globalCache[n]||[]).filter(e=>isThisWeek(e.date));
  return tw.length>0?tw.reduce((b,e)=>e.weight>b.weight?e:b):null;
}

function getH(hk,n){return cache[ck(hk,n)]||[];}

// ── Input color based on performance ─────────────────────────────────────
function inputCls(n,enteredW){
  if(!enteredW||isNaN(parseFloat(enteredW)))return'';
  const val=parseFloat(enteredW);
  const last=getGlobalLast(n);
  if(!last)return'';
  if(val>last.weight)return'pr';
  if(val===last.weight)return'ok';
  return'lo';
}

// ── Firebase ──────────────────────────────────────────────────────────────
async function loadDay(dayName){
  const day=PLAN[dayName];if(!day.hk||!user)return;
  try{
    const ss=await getDoc(doc(db,upath(`sessions/${weekKey}_${dayName}`)));
    if(ss.exists()){const d=ss.data();logs=d.sets||{};done=new Set(Object.keys(logs));}
    const hs=await getDoc(doc(db,upath(`history/${day.hk}`)));
    if(hs.exists())for(const[n,arr]of Object.entries(hs.data()))
      if(Array.isArray(arr))for(const e of arr)inject(day.hk,n,e.date,e.weight,e.reps||0);
  }catch(e){console.error(e);}
  render();
}

async function saveEx(exName){
  if(!user)return;
  const day=PLAN[activeDay];
  saveStatus[exName]='spin';render();
  const el=logs[exName]||{};
  const vals=Object.values(el).filter(v=>typeof v==='object'&&v.w);
  const ws=vals.map(s=>parseFloat(s.w)).filter(w=>!isNaN(w)&&w>0);
  const maxW=ws.length>0?Math.max(...ws):null;
  let bestR=0;
  if(maxW)for(const s of vals){if(parseFloat(s.w)===maxW){const r=parseInt(s.r)||0;if(r>bestR)bestR=r;}}
  try{
    const sRef=doc(db,upath(`sessions/${weekKey}_${activeDay}`));
    const sSnap=await getDoc(sRef);
    const ex=sSnap.exists()?(sSnap.data().sets||{}):{};
    ex[exName]=el;
    await setDoc(sRef,{day:activeDay,week:weekKey,savedAt:new Date().toISOString(),sets:ex});
    if(maxW&&day.hk){
      const hRef=doc(db,upath(`history/${day.hk}`));
      const hSnap=await getDoc(hRef);
      const hd=hSnap.exists()?hSnap.data():{};
      const arr=(hd[exName]||[]).filter(e=>e.date!==todayStr);
      arr.push({date:todayStr,weight:maxW,reps:bestR});
      arr.sort((a,b)=>parseDate(a.date)-parseDate(b.date));
      hd[exName]=arr.slice(-20);
      await setDoc(hRef,hd);
      inject(day.hk,exName,todayStr,maxW,bestR);
    }
    done.add(exName);
    saveStatus[exName]='go';
    // PR detection
    const prev=getGlobalLast(exName);
    const prMsg=prev&&maxW>prev.weight?` 🏆 PR +${(maxW-prev.weight).toFixed(1)}kg`:'';
    toast(`✓ ${exName.split(' ').slice(0,2).join(' ')} saved${prMsg}`);
    setTimeout(()=>{saveStatus[exName]=null;render();},2500);
  }catch(e){saveStatus[exName]=null;toast('⚠ Save failed',true);console.error(e);}
  render();
}

async function delEntry(hk,n,date){
  removeH(hk,n,date);
  if(date===todayStr)done.delete(n);
  try{
    const hRef=doc(db,upath(`history/${hk}`));
    const snap=await getDoc(hRef);
    if(snap.exists()){const d=snap.data();if(d[n]){d[n]=d[n].filter(e=>e.date!==date);await setDoc(hRef,d);}}
    if(date===todayStr){
      const sRef=doc(db,upath(`sessions/${weekKey}_${activeDay}`));
      const snap2=await getDoc(sRef);
      if(snap2.exists()){const d=snap2.data();if(d.sets?.[n]){delete d.sets[n];delete logs[n];await setDoc(sRef,d);}}
    }
    toast('🗑 Deleted');
  }catch(e){toast('⚠ Delete failed',true);}
  render();
}

// ── Export for Coach (Sunday only) ────────────────────────────────────────
async function exportCoach(){
  if(!user)return;
  const lines=['═══════════════════════','WEEKLY LIFT SUMMARY',`Week: ${weekKey}`,`Date: ${todayStr}`,'═══════════════════════'];
  for(const dayName of['Monday','Tuesday','Thursday','Friday']){
    const day=PLAN[dayName];
    try{
      const snap=await getDoc(doc(db,upath(`sessions/${weekKey}_${dayName}`)));
      if(!snap.exists())continue;
      const sets=snap.data().sets||{};
      if(!Object.keys(sets).length)continue;
      lines.push('');lines.push(`── ${dayName.toUpperCase()} (${day.focus}) ──`);
      for(const ex of day.exercises){
        const es=sets[ex.n];if(!es)continue;
        const vals=Object.values(es).filter(v=>typeof v==='object'&&v.w);
        const ws=vals.map(s=>parseFloat(s.w)).filter(w=>!isNaN(w)&&w>0);
        const rs=vals.map(s=>parseInt(s.r)).filter(r=>!isNaN(r)&&r>0);
        if(!ws.length)continue;
        const maxW=Math.max(...ws);
        const avgR=rs.length?Math.round(rs.reduce((a,b)=>a+b)/rs.length):'?';
        const sc=vals.filter(s=>parseFloat(s.w)>0).length;
        const prev=(globalCache[ex.n]||[]).filter(e=>!isThisWeek(e.date));
        const pb=prev.length?prev[prev.length-1]:null;
        const trend=pb?(maxW>pb.weight?` ↑ PR +${(maxW-pb.weight).toFixed(1)}kg`:maxW<pb.weight?` ↓ -${(pb.weight-maxW).toFixed(1)}kg`:' ='):'';
        const side=ex.smith?' /side':'';
        lines.push(`${ex.n}: ${maxW}kg${side} × ${avgR} reps (${sc} sets)${trend}`);
      }
    }catch(e){console.error(e);}
  }
  lines.push('');lines.push('═══════════════════════');
  lines.push('Paste into Claude with:');lines.push('weight · waist · body fat %');lines.push('═══════════════════════');
  const text=lines.join('\n');
  window._ce=text;
  try{await navigator.clipboard.writeText(text);toast('✓ Copied — paste into Claude');}
  catch(e){showExModal(text);}
}

// ── Sparkline ─────────────────────────────────────────────────────────────
function spark(data,color){
  const v=data.map(d=>d.weight).filter(x=>x>0);if(v.length<2)return'';
  const mn=Math.min(...v),mx=Math.max(...v),rng=mx-mn||1;
  const W=56,H=18;
  const pts=v.map((x,i)=>`${(i/(v.length-1))*W},${H-((x-mn)/rng)*(H-3)-1.5}`).join(' ');
  const[lx,ly]=pts.split(' ').pop().split(',');
  return`<svg width="${W}" height="${H}" style="display:block;flex-shrink:0"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/><circle cx="${lx}" cy="${ly}" r="2.5" fill="${color}"/></svg>`;
}

        <div style="font-size:10px;color:#333;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px">Sunday Review</div>
        <button onclick="exportCoach()" style="padding:14px 28px;background:#0A0A1A;border:1px solid #1A1A3A;border-radius:10px;color:#5A7AEF;font-size:14px;font-weight:700;cursor:pointer;">📋 Export Week for Coach</button>
        <div style="font-size:10px;color:#2A2A2A;margin-top:10px">Paste into Claude with weight · waist · BF%</div>
      </div>`:''}
    </div>`;
  } else {
    const doneCnt=[...done].filter(n=>day.exercises.find(e=>e.n===n)).length;
    const totCnt=day.exercises.filter(e=>!e.bw).length;

    const cards=day.exercises.map((ex,i)=>{
      const isOpen=openEx===i;
      const isDone=done.has(ex.n);
      const bw=!!ex.bw,isSmith=!!ex.smith;
      const hist=getH(day.hk,ex.n);
      const globalLast=getGlobalLast(ex.n);
      const wb=getWeekBest(ex.n);
      const best=getGlobalBest(ex.n);
      const ss=saveStatus[ex.n];

      const repLabel=ex.t>0?`${ex.s}×${ex.t}`:`${ex.s} sets`;
      let wPill='';
      if(!bw){
        if(wb) wPill=`<span style="font-size:10px;color:#3A3A3A">This week: <span style="color:#4ADE80;font-weight:600">${wb.weight}kg${isSmith?' /side':''}×${wb.reps||'?'}</span></span>`;
        else if(globalLast) wPill=`<span style="font-size:10px;color:#3A3A3A">Last: <span style="color:#777;font-weight:600">${globalLast.weight}kg${isSmith?' /side':''}</span></span>`;
      }
      const bPill=(!bw&&best)?`<span style="font-size:10px;color:#3A3A3A">Best: <span style="color:#FFB800;font-weight:600">${best.w}kg×${best.r}</span></span>`:'';
      const doneBadge=isDone?`<span style="font-size:9px;color:#4ADE80;background:#0A1A0A;border:1px solid #163316;padding:2px 6px;border-radius:12px;font-weight:600;flex-shrink:0">✓</span>`:'';
      const sp=(!bw&&hist.length>1)?spark(hist,day.color):'';

      let body='';
      if(isOpen){
        // History
        let recentHTML='';
        if(!bw&&hist.length>0){
          const items=hist.slice(-5).map(r=>{
            const isTd=r.date===todayStr,iTw=isThisWeek(r.date);
            return`<div style="background:#0A0A0A;border:1px solid ${iTw?day.color+'44':'#161616'};border-radius:6px;padding:4px 7px;display:flex;align-items:center;gap:4px">
              <div><div style="font-size:11px;font-weight:600;color:${isTd?day.color:iTw?'#888':'#555'}">${r.weight}kg${r.reps?'×'+r.reps:''}</div><div style="font-size:9px;color:#2A2A2A">${r.date}</div></div>
              <button class="xb" onclick="doDel('${day.hk}','${ex.n}','${r.date}')">✕</button>
            </div>`;
          }).join('');
          recentHTML=`<div style="padding:8px 12px;border-bottom:1px solid #0E0E0E">
            <div style="font-size:9px;color:#2A2A2A;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px">History</div>
            <div style="display:flex;gap:4px;flex-wrap:wrap">${items}</div>
          </div>`;
        }

        // Sets — weight input gets color feedback, reps auto-filled with target
        const phW=globalLast?`${globalLast.weight}`:isSmith?'kg/side':'kg';
        const phR=ex.t>0?`${ex.t}`:'reps';
        const colT=bw?'20px 1fr':'20px 1fr 1fr';
        const hdr=bw
          ?`<div></div><div style="font-size:9px;color:#222;text-transform:uppercase;text-align:center">Reps</div>`
          :`<div></div><div style="font-size:9px;color:#222;text-transform:uppercase;text-align:center">kg${isSmith?' /side':''}</div><div style="font-size:9px;color:#222;text-transform:uppercase;text-align:center">Reps</div>`;

        const rows=Array.from({length:ex.s}).map((_,si)=>{
          const wv=logs[ex.n]?.[si]?.w||'';
          const rv=logs[ex.n]?.[si]?.r||'';
          const wId=iid(ex.n,si,'w');
          const rId=iid(ex.n,si,'r');
          const nwId=si<ex.s-1?iid(ex.n,si+1,'w'):null;
          const wCls=inputCls(ex.n,wv);

          if(bw) return`<div class="sg" style="grid-template-columns:${colT}">
            <div style="font-size:10px;color:#222;text-align:center">${si+1}</div>
            <input id="${rId}" class="si" value="${rv}" placeholder="${phR}" inputmode="numeric" autocomplete="off"
              onchange="setLV('${ex.n}',${si},'r',this.value)"
              onkeydown="adv(event,${nwId?`'${nwId}'`:null})">
          </div>`;

          return`<div class="sg" style="grid-template-columns:${colT}">
            <div style="font-size:10px;color:#222;text-align:center">${si+1}</div>
            <input id="${wId}" class="si ${wCls}" value="${wv}" placeholder="${phW}" inputmode="decimal" autocomplete="off"
              onchange="setLV('${ex.n}',${si},'w',this.value);updateInputColor('${ex.n}',${si},'${wId}')"
              onkeydown="adv(event,'${rId}')">
            <input id="${rId}" class="si" value="${rv}" placeholder="${phR}" inputmode="numeric" autocomplete="off"
              onchange="setLV('${ex.n}',${si},'r',this.value)"
              onkeydown="adv(event,${nwId?`'${nwId}'`:null})">
          </div>`;
        }).join('');

        const btnCls=ss==='spin'?'sv spin':ss==='go'?'sv go':'sv';
        const btnTxt=ss==='spin'?'Saving...':ss==='go'?'✓ Saved':'Save';

        body=`<div style="border-top:1px solid #0E0E0E">
          <div style="padding:5px 12px;font-size:10px;color:#2A2A2A;font-style:italic;border-bottom:1px solid #0A0A0A">${ex.note}</div>
          ${recentHTML}
          <div style="padding:10px 12px">
            <div class="sg" style="grid-template-columns:${colT};margin-bottom:5px">${hdr}</div>
            ${rows}
            <button class="${btnCls}" onclick="doSave('${ex.n}')" ${ss==='spin'?'disabled':''}>${btnTxt}</button>
          </div>
        </div>`;
      }

      return`<div class="card${isDone?' done':''}">
        <div class="ch" onclick="tog(${i})">
          <div style="width:20px;height:20px;border-radius:5px;background:${isDone?'#163316':day.color+'18'};border:1px solid ${isDone?'#1A4A1A':day.color+'33'};display:flex;align-items:center;justify-content:center;font-size:9px;color:${isDone?'#4ADE80':day.color};font-weight:700;flex-shrink:0">${isDone?'✓':i+1}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;margin-bottom:2px;${isDone?'color:#555':''}">${ex.n}</div>
            <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
              <span style="font-size:10px;color:${isDone?'#4ADE80':day.color};background:${isDone?'#0A1A0A':day.color+'18'};padding:1px 7px;border-radius:12px;font-weight:600">${repLabel}</span>
              ${wPill}${bPill}${doneBadge}
            </div>
          </div>
          ${sp}
          <div style="color:#1E1E1E;font-size:10px;flex-shrink:0">${isOpen?'▲':'▼'}</div>
        </div>
        ${body}
      </div>`;
    }).join('');

    content=`<div style="padding:12px 12px 40px;max-width:800px;margin:0 auto">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <div style="width:3px;height:26px;border-radius:2px;background:${day.color}"></div>
        <div style="flex:1">
          <div style="font-size:9px;color:#444;letter-spacing:2px;text-transform:uppercase">${activeDay}</div>
          <div style="font-size:16px;font-weight:700">${day.focus} Day</div>
        </div>
        <div style="font-size:10px;color:#333">${doneCnt}/${totCnt}</div>
      </div>
      ${cards}
    </div>`;
  }

  document.getElementById('root').innerHTML=`
    <div style="background:#0C0C0C;border-bottom:1px solid #161616;padding:12px 16px;display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-size:8px;letter-spacing:3px;color:#333;text-transform:uppercase;margin-bottom:1px">Training Log</div>
        <div style="font-size:17px;font-weight:700">Workout Tracker</div>
      </div>
      <button class="so" onclick="doSO()">Sign out</button>
    </div>
    <div class="tabs">${tabs}</div>
    ${content}`;

  // Auto-focus first weight input when exercise opens
  if(openEx!==null&&!isRest){
    const ex=PLAN[activeDay].exercises[openEx];
    if(ex){
      const firstId=ex.bw?iid(ex.n,0,'r'):iid(ex.n,0,'w');
      setTimeout(()=>{const el=document.getElementById(firstId);if(el&&!el.value){el.focus();}},60);
    }
  }
}

// ── Handlers ──────────────────────────────────────────────────────────────
window.sw=async function(d){activeDay=d;openEx=null;saveStatus={};logs={};done=new Set();render();await loadDay(d);};
window.tog=function(i){openEx=openEx===i?null:i;render();};
window.setLV=function(n,si,f,v){if(!logs[n])logs[n]={};if(!logs[n][si])logs[n][si]={};logs[n][si][f]=v;};
window.doSave=function(n){saveEx(n);};
window.doDel=function(hk,n,d){delEntry(hk,n,d);};
window.doSO=async function(){await signOut(auth);};
window.adv=function(e,nextId){
  if(e.key==='Enter'||e.key==='Tab'){
    e.preventDefault();
    if(nextId){const el=document.getElementById(nextId);if(el){el.focus();el.select();}}
  }
};
window.updateInputColor=function(exName,si,inputId){
  const val=logs[exName]?.[si]?.w;
  const el=document.getElementById(inputId);
  if(!el)return;
  el.className='si '+inputCls(exName,val);
};

// ── Auth ──────────────────────────────────────────────────────────────────
onAuthStateChanged(auth,async u=>{
  if(u){user=u;initCache();render();await loadDay(activeDay);}
  else{user=null;logs={};cache={};globalCache={};saveStatus={};openEx=null;done=new Set();renderLogin();}
});
</script>
</body>
</html>
