      const [logs, setLogs] = React.useState({});
      const [expandedEx, setExpandedEx] = React.useState(null);

      // Load data from Firebase on startup
      React.useEffect(() => {
        db.collection("workouts").doc("latest").get().then((doc) => {
          if (doc.exists) setLogs(doc.data());
        });
      }, []);

      const getLog = (d, ex, s, f) => logs?.[d]?.[ex]?.[s]?.[f] || "";
      
      const setLog = (d, ex, s, f, v) => {
        const newLogs = { ...logs, [d]: { ...logs[d], [ex]: { ...logs[d]?.[ex], [s]: { ...logs[d]?.[ex]?.[s], [f]: v } } } };
        setLogs(newLogs);
        // Sync to Firebase
        db.collection("workouts").doc("latest").set(newLogs);
      };
