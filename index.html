<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workout Tracker</title>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #080808; color: #F0F0F0; }
    input { background: #1A1A1A; border: 1px solid #333; color: white; padding: 8px; border-radius: 6px; width: 100%; font-size: 14px; }
    button { cursor: pointer; padding: 10px; border: none; background: #222; color: white; border-radius: 6px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const firebaseConfig = {
      apiKey: "AIzaSyAIXfdxKItrUVJI5m-PB_sK-73ucmWbm9I",
      authDomain: "ragnar9999workouttracker.firebaseapp.com",
      projectId: "ragnar9999workouttracker",
      storageBucket: "ragnar9999workouttracker.firebasestorage.app",
      messagingSenderId: "700941522087",
      appId: "1:700941522087:web:7d26765db39b798960b782"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const PLAN = {
      Monday: {focus:"Push", color:"#E8572A", exercises:[{name:"Incline Smith Machine Press", sets:4, reps:"10"}, {name:"Flat Machine Press", sets:3, reps:"12"}, {name:"Cable Fly High→Low", sets:3, reps:"12"}, {name:"Cable Fly Low→High", sets:3, reps:"12"}, {name:"DB Lateral Raise", sets:4, reps:"20"}, {name:"Cable Lateral Raise", sets:3, reps:"25"}, {name:"Cable Curl (Straight Bar)", sets:3, reps:"10"}, {name:"Bayesian Curl", sets:2, reps:"10"}, {name:"Hammer Curl", sets:3, reps:"12"}, {name:"Abs (Optional)", sets:3, reps:"15"}]},
      Tuesday: {focus:"Pull", color:"#2A7BE8", exercises:[{name:"Lat Pulldown", sets:4, reps:"12"}, {name:"Triangle Cable Row", sets:3, reps:"10"}, {name:"Wide-Grip Row", sets:3, reps:"10"}, {name:"Lat Prayers", sets:3, reps:"12"}, {name:"Rear Delt Fly", sets:3, reps:"25"}, {name:"Face Pull", sets:3, reps:"15"}, {name:"Overhead Triceps Extension", sets:3, reps:"12"}, {name:"Rope Pushdown", sets:3, reps:"12"}, {name:"Cable Crunches", sets:3, reps:"15"}]},
      Wednesday: {focus:"Rest", color:"#3A3A3A", exercises:[]},
      Thursday: {focus:"Legs", color:"#16A34A", exercises:[{name:"Leg Press", sets:4, reps:"10"}, {name:"DB RDL", sets:3, reps:"10"}, {name:"Hamstring Curl", sets:3, reps:"12"}, {name:"Back Extension", sets:3, reps:"12"}, {name:"Hip Adduction", sets:3, reps:"15"}, {name:"Hip Abduction", sets:3, reps:"15"}, {name:"Calf Raises", sets:4, reps:"15"}]},
      Friday: {focus:"Upper", color:"#9333EA", exercises:[{name:"Incline Smith Machine Press", sets:3, reps:"10"}, {name:"Lat Pulldown", sets:3, reps:"12"}, {name:"Wide-Grip Row", sets:3, reps:"10"}, {name:"Cable Fly", sets:3, reps:"12"}, {name:"Shoulder Press", sets:3, reps:"10"}, {name:"Lat Prayers", sets:3, reps:"12"}, {name:"DB Lateral Raise", sets:3, reps:"15"}, {name:"Rear Delt Fly", sets:3, reps:"15"}, {name:"Cable Curl (Straight Bar)", sets:3, reps:"12"}, {name:"Hammer Curl", sets:3, reps:"12"}, {name:"Overhead Triceps Extension", sets:3, reps:"12"}, {name:"Rope Pushdown", sets:3, reps:"12"}, {name:"Cable Crunches", sets:3, reps:"15"}]},
      Saturday: {focus:"Rest", color:"#3A3A3A", exercises:[]},
      Sunday: {focus:"Rest", color:"#3A3A3A", exercises:[]}
    };

    function Sparkline({history, color}) {
      const weights = history.map(h => h.w).filter(w => w > 0);
      if(weights.length < 2) return null;
      const min = Math.min(...weights), max = Math.max(...weights), range = (max - min) || 1;
      const W = 80, H = 25;
      const pts = weights.map((v, i) => `${(i / (weights.length - 1)) * W},${H - ((v - min) / range) * (H - 8) - 4}`).join(" ");
      return <svg width={W} height={H}><polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
    }

    function WorkoutTracker() {
      const [logs, setLogs] = React.useState({});
      const [day, setDay] = React.useState("Monday");
      const today = new Date().toISOString().split('T')[0];

      React.useEffect(() => {
        db.collection("workouts").doc("latest").onSnapshot(doc => { if (doc.exists) setLogs(doc.data()); });
      }, []);

      const saveLog = (ex, s, field, val) => {
        const newLogs = { ...logs, [ex]: { ...logs[ex], [today]: { ...logs[ex]?.[today], [s]: { ...logs[ex]?.[today]?.[s], [field]: val } } } };
        setLogs(newLogs);
        db.collection("workouts").doc("latest").set(newLogs);
      };

      const getRecent = (ex) => {
        if (!logs[ex]) return [];
        return Object.entries(logs[ex])
          .sort(([a], [b]) => b.localeCompare(a))
          .slice(0, 6)
          .reverse()
          .map(([date, sets]) => ({ w: Math.max(...Object.values(sets).map(s => parseFloat(s.weight || 0))), date }));
      };

      return (
        <div style={{padding:"20px", maxWidth:"600px", margin:"auto"}}>
          <div style={{display:"flex", gap:"10px", marginBottom:"20px"}}>
            {Object.keys(PLAN).map(d => <button key={d} onClick={() => setDay(d)} style={{flex:1, background:day===d ? PLAN[d].color : "#222"}}>{d.slice(0,3)}</button>)}
          </div>
          {PLAN[day].exercises.map((ex, i) => (
            <div key={i} style={{marginBottom:"20px", padding:"15px", background:"#111", borderRadius:"10px"}}>
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"10px"}}>
                <h4 style={{fontSize:"16px"}}>{ex.name}</h4>
                <Sparkline history={getRecent(ex.name)} color={PLAN[day].color}/>
              </div>
              {Array.from({length:ex.sets}).map((_, s) => (
                <div key={s} style={{display:"flex", gap:"10px", marginBottom:"5px"}}>
                  <input placeholder="kg" defaultValue={logs?.[ex.name]?.[today]?.[s]?.weight || ""} onBlur={(e) => saveLog(ex.name, s, "weight", e.target.value)} />
                  <input placeholder="reps" defaultValue={logs?.[ex.name]?.[today]?.[s]?.reps || ""} onBlur={(e) => saveLog(ex.name, s, "reps", e.target.value)} />
                </div>
              ))}
            </div>
          ))}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<WorkoutTracker />);
  </script>
</body>
</html>
