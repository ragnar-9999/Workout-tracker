        {name:"Cable Curl (Straight Bar)", sets:3, reps:"12", hKey:"Cable Curl (Straight Bar)", note:"Biceps after compounds — on a great upward trend"},
        {name:"Hammer Curl", sets:3, reps:"12", hKey:"Hammer Curl", note:"Superset with cable curl if short on time"},
        {name:"Overhead Triceps Extension", sets:3, reps:"12", hKey:"Overhead Triceps Extension", note:"Long head priority — cable station"},
        {name:"Rope Pushdown", sets:3, reps:"12", hKey:"Rope Pushdown", note:"Single handed finisher"},
        {name:"Cable Crunches", sets:3, reps:"15", hKey:"Cable Crunches", note:"End of session core"},
      ]},
      Saturday: {focus:"Rest", color:"#3A3A3A", histKey:null, exercises:[]},
      Sunday: {focus:"Rest", color:"#3A3A3A", histKey:null, exercises:[]},
    };

    const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

    function Sparkline({data, color}) {
      if(!data || data.length<2) return null;
      const vals = data.map(d=>d.weight).filter(v=>v>0);
      if(vals.length<2) return null;
      const min=Math.min(...vals), max=Math.max(...vals), range=max-min||1;
      const W=72, H=22;
      const pts=vals.map((v,i)=>`${(i/(vals.length-1))*W},${H-((v-min)/range)*(H-4)-2}`).join(" ");
      const last=pts.split(" ").pop().split(",");
      return (
        <svg width={W} height={H} style={{display:"block"}}>
          <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" opacity="0.6"/>
          <circle cx={last[0]} cy={last[1]} r="2.5" fill={color}/>
        </svg>
      );
    }

    function WorkoutTracker() {
      const [activeDay, setActiveDay] = React.useState("Monday");
      const [logs, setLogs] = React.useState(() => {
        const saved = localStorage.getItem("workoutLogs");
        return saved ? JSON.parse(saved) : {};
      });
      const [expandedEx, setExpandedEx] = React.useState(null);

      React.useEffect(() => {
        localStorage.setItem("workoutLogs", JSON.stringify(logs));
      }, [logs]);

      const day = PLAN[activeDay];
      const isRest = day.focus === "Rest";

      const getLog = (d, ex, s, f) => logs?.[d]?.[ex]?.[s]?.[f] || "";
      const setLog = (d, ex, s, f, v) => setLogs(p => ({...p, [d]:{...p[d], [ex]:{...p[d]?.[ex], [s]:{...p[d]?.[ex]?.[s], [f]:v}}}}));

      const getHist = (ex) => {
        if(!ex.hKey || !day.histKey) return null;
        return HISTORY[day.histKey]?.[ex.hKey] || null;
      };

      return (
        <div style={{fontFamily:"-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif", background:"#080808", minHeight:"100vh", color:"#F0F0F0"}}>
          <div style={{background:"#0F0F0F", borderBottom:"1px solid #1A1A1A", padding:"16px 20px"}}>
            <div style={{fontSize:9, letterSpacing:3, color:"#444", textTransform:"uppercase", marginBottom:3}}>Sanjeeb · Training Log</div>
            <div style={{fontSize:19, fontWeight:700}}>Workout Tracker</div>
          </div>

          <div style={{display:"flex", borderBottom:"1px solid #1A1A1A", background:"#0A0A0A", overflowX:"auto"}}>
            {DAYS.map(d => {
              const dp = PLAN[d], active = d === activeDay;
              return (
                <button key={d} onClick={() => {setActiveDay(d); setExpandedEx(null);}}
                  style={{background:active?"#111":"transparent", border:"none",
                    borderBottom:active?`2px solid ${dp.color}`:"2px solid transparent",
                    color:active?"#F0F0F0":"#444", padding:"11px 15px", cursor:"pointer",
                    fontSize:11, fontWeight:active?700:400, whiteSpace:"nowrap"}}>
                  <div>{d.slice(0,3).toUpperCase()}</div>
                  <div style={{fontSize:9, letterSpacing:1, marginTop:2, color:active?dp.color:"#333"}}>{dp.focus.toUpperCase()}</div>
                </button>
              );
            })}
          </div>

          {isRest ? (
            <div style={{padding:40, textAlign:"center"}}>
              <div style={{fontSize:36, marginBottom:10}}>💤</div>
              <div style={{color:"#444", fontSize:14}}>Rest day. Recover, eat, sleep.</div>
            </div>
          ) : (
            <div style={{padding:"14px 14px 60px", maxWidth:860, margin:"0 auto"}}>
              <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:14}}>
                <div style={{width:3, height:30, borderRadius:2, background:day.color}}/>
                <div>
                  <div style={{fontSize:9, color:"#555", letterSpacing:2, textTransform:"uppercase"}}>{activeDay}</div>
                  <div style={{fontSize:17, fontWeight:700}}>{day.focus} Day</div>
                </div>
              </div>

              {day.exercises.map((ex, i) => {
                const hist = getHist(ex);
                const expanded = expandedEx === i;
                const bw = ex.name.includes("Crunch") || ex.name.includes("Abs");
                const lastW = hist?.last?.weight;
                const bestW = hist?.best?.weight;
                const isSmith = ex.name.includes("Smith");

                return (
                  <div key={i} style={{marginBottom:8, background:"#111", borderRadius:10, border:"1px solid #1C1C1C", overflow:"hidden"}}>
                    <div onClick={() => setExpandedEx(expanded ? null : i)}
                      style={{padding:"11px 13px", cursor:"pointer", display:"flex", alignItems:"center", gap:10}}>
                      <div style={{width:21, height:21, borderRadius:5, background:day.color+"20",
                        border:`1px solid ${day.color}40`, display:"flex", alignItems:"center",
                        justifyContent:"center", fontSize:9, color:day.color, fontWeight:700, flexShrink:0}}>
                        {i+1}
                      </div>
                      <div style={{flex:1, minWidth:0}}>
                        <div style={{fontSize:13, fontWeight:600, marginBottom:3}}>{ex.name}</div>
                        <div style={{display:"flex", alignItems:"center", gap:6, flexWrap:"wrap"}}>
                          <span style={{fontSize:10, color:day.color, background:day.color+"15", padding:"2px 7px", borderRadius:20, fontWeight:600}}>
                            {ex.sets}×{ex.reps}
                          </span>
                          {!bw && lastW > 0 && (
                            <span style={{fontSize:10, color:"#555"}}>
                              Last: <span style={{color:"#BBB", fontWeight:600}}>{lastW} kg{isSmith?" /side":""}</span>
                            </span>
                          )}
                          {!bw && bestW > 0 && (
                            <span style={{fontSize:10, color:"#555"}}>
                              Best: <span style={{color:"#FFB800", fontWeight:600}}>{bestW} kg{isSmith?" /side":""}</span>
                            </span>
                          )}
                        </div>
                      </div>
                      {hist?.recent?.length > 1 && !bw && (
                        <div style={{flexShrink:0}}><Sparkline data={hist.recent} color={day.color}/></div>
                      )}
                      <div style={{color:"#2A2A2A", fontSize:11, flexShrink:0}}>{expanded?"▲":"▼"}</div>
                    </div>

                    {expanded && (
                      <div style={{borderTop:"1px solid #181818"}}>
                        <div style={{padding:"7px 13px", fontSize:11, color:"#555", fontStyle:"italic", borderBottom:"1px solid #161616"}}>
                          {ex.note}
                        </div>

                        {hist?.recent?.length > 0 && !bw && (
                          <div style={{padding:"10px 13px", borderBottom:"1px solid #161616"}}>
                            <div style={{fontSize:9, color:"#3A3A3A", textTransform:"uppercase", letterSpacing:1, marginBottom:6}}>
                              Recent — {hist.sessions} sessions logged
                            </div>
                            <div style={{display:"flex", gap:5, flexWrap:"wrap"}}>
                              {hist.recent.slice(-6).map((r,j) => (
                                <div key={j} style={{background:"#0A0A0A", border:"1px solid #1E1E1E", borderRadius:6, padding:"4px 8px", textAlign:"center"}}>
                                  <div style={{fontSize:11, fontWeight:600, color:"#DDD"}}>{r.weight} kg</div>
                                  <div style={{fontSize:9, color:"#3A3A3A", marginTop:1}}>{r.date}</div>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}

                        <div style={{padding:"10px 13px"}}>
                          <div style={{display:"grid", gridTemplateColumns:bw?"28px 1fr 1fr":"28px 1fr 1fr 1fr", gap:5, marginBottom:5}}>
                            <div style={{fontSize:9, color:"#2A2A2A", textTransform:"uppercase", letterSpacing:1}}>#</div>
                            <div style={{fontSize:9, color:"#2A2A2A", textTransform:"uppercase", letterSpacing:1}}>{bw?"Reps":"kg"+(isSmith?" /side":"")}</div>
                            {!bw && <div style={{fontSize:9, color:"#2A2A2A", textTransform:"uppercase", letterSpacing:1}}>Reps</div>}
                            <div style={{fontSize:9, color:"#2A2A2A", textTransform:"uppercase", letterSpacing:1}}>Note</div>
                          </div>
                          {Array.from({length:ex.sets}).map((_,si) => (
                            <div key={si} style={{display:"grid", gridTemplateColumns:bw?"28px 1fr 1fr":"28px 1fr 1fr 1fr", gap:5, marginBottom:5}}>
                              <div style={{fontSize:11, color:"#3A3A3A", display:"flex", alignItems:"center"}}>{si+1}</div>
                              {bw ? (
                                <>
                                  <input value={getLog(activeDay,ex.name,si,"reps")} onChange={e=>setLog(activeDay,ex.name,si,"reps",e.target.value)} placeholder="reps"
                                    style={{background:"#0A0A0A", border:"1px solid #1E1E1E", borderRadius:6, color:"#E0E0E0", fontSize:12, padding:"5px 9px", fontFamily:"inherit", width:"100%", boxSizing:"border-box"}}/>
                                  <input value={getLog(activeDay,ex.name,si,"note")} onChange={e=>setLog(activeDay,ex.name,si,"note",e.target.value)} placeholder="—"
                                    style={{background:"#0A0A0A", border:"1px solid #1E1E1E", borderRadius:6, color:"#E0E0E0", fontSize:12, padding:"5px 9px", fontFamily:"inherit", width:"100%", boxSizing:"border-box"}}/>
                                </>
                              ) : (
                                <>
                                  <input value={getLog(activeDay,ex.name,si,"weight")} onChange={e=>setLog(activeDay,ex.name,si,"weight",e.target.value)} placeholder={lastW?`${lastW}`:"kg"}
                                    style={{background:"#0A0A0A", border:"1px solid #1E1E1E", borderRadius:6, color:"#E0E0E0", fontSize:12, padding:"5px 9px", fontFamily:"inherit", width:"100%", boxSizing:"border-box"}}/>
                                  <input value={getLog(activeDay,ex.name,si,"reps")} onChange={e=>setLog(activeDay,ex.name,si,"reps",e.target.value)} placeholder={ex.reps}
                                    style={{background:"#0A0A0A", border:"1px solid #1E1E1E", borderRadius:6, color:"#E0E0E0", fontSize:12, padding:"5px 9px", fontFamily:"inherit", width:"100%", boxSizing:"border-box"}}/>
                                  <input value={getLog(activeDay,ex.name,si,"note")} onChange={e=>setLog(activeDay,ex.name,si,"note",e.target.value)} placeholder="—"
                                    style={{background:"#0A0A0A", border:"1px solid #1E1E1E", borderRadius:6, color:"#E0E0E0", fontSize:12, padding:"5px 9px", fontFamily:"inherit", width:"100%", boxSizing:"border-box"}}/>
                                </>
                              )}
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<WorkoutTracker />);
  </script>
</body>
</html>
