function getWeekKey(date) {
  const d = new Date(date);

  const monday = new Date(d);
  monday.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return monday.toISOString().slice(0, 10);
}

  const d = new Date();

}

// ── Merge seed + firebase recent ──────────────────────────────────────────
function getCacheKey(histKey, exName) { return `${histKey}__${exName}`; }

function initRecentCache() {
  // Pre-fill from seed
  for (const [dayKey, exMap] of Object.entries(SEED_HISTORY)) {
    for (const [exName, arr] of Object.entries(exMap)) {
      recentCache[getCacheKey(dayKey, exName)] = [...arr];
    }
  }
}

function getRecent(histKey, exName) {
  return recentCache[getCacheKey(histKey, exName)] || [];
}

function injectRecentEntry(histKey, exName, dateStr, weight) {
  const key = getCacheKey(histKey, exName);
  if (!recentCache[key]) recentCache[key] = [];
  // Remove existing entry for same date
  recentCache[key] = recentCache[key].filter(e => e.date !== dateStr);
  recentCache[key].push({ date: dateStr, weight });
  // Sort by date (dd/mm/yyyy)
  recentCache[key].sort((a, b) => {
    const parse = s => { const [d,m,y] = s.split('/'); return new Date(y,m-1,d); };
    return parse(a.date) - parse(b.date);
  });
  // Keep last 8
  if (recentCache[key].length > 8) recentCache[key] = recentCache[key].slice(-8);
}

function removeRecentEntry(histKey, exName, dateStr) {
  const key = getCacheKey(histKey, exName);
  if (!recentCache[key]) return;
  recentCache[key] = recentCache[key].filter(e => e.date !== dateStr);
}

// ── Firebase ops ──────────────────────────────────────────────────────────
async function loadDayFromFirebase(dayName) {
  const day = PLAN[dayName];
  if (!day.histKey) return;

  try {
    // Load session logs
    const sessSnap = await getDoc(doc(db, "sessions", `${weekKey}_${dayName}`));
    if (sessSnap.exists()) {
      logs = sessSnap.data().sets || {};
    }

    // Load recent history from firebase and inject into cache
    const histSnap = await getDoc(doc(db, "history", day.histKey));
    if (histSnap.exists()) {
      const data = histSnap.data();
      for (const [exName, entries] of Object.entries(data)) {
        if (Array.isArray(entries)) {
          for (const e of entries) {
            injectRecentEntry(day.histKey, exName, e.date, e.weight);
          }
        }
      }
    }
  } catch(e) {
    console.error("Load error:", e);
  }
  render();
}

    const sessSnap = await getDoc(sessRef);
    const existing = sessSnap.exists() ? (sessSnap.data().sets || {}) : {};
    existing[exName] = exLogs;
    await setDoc(sessRef, { day: activeDay, week: weekKey, savedAt: new Date().toISOString(), sets: existing });

    // Save to history and update recent cache
    if (maxWeight && day.histKey) {
      const histRef = doc(db, "history", day.histKey);
      const histSnap = await getDoc(histRef);
      const histData = histSnap.exists() ? histSnap.data() : {};
      const exHistory = histData[exName] || [];
      // Remove existing today entry, add new
      const filtered = exHistory.filter(e => e.date !== today);
      filtered.push({ date: today, weight: maxWeight });
      filtered.sort((a, b) => { const p = s => { const [d,m,y] = s.split('/'); return new Date(y,m-1,d); }; return p(a.date) - p(b.date); });
      histData[exName] = filtered.slice(-20); // keep last 20 in DB
      await setDoc(histRef, histData);

      // Inject into local cache immediately
      injectRecentEntry(day.histKey, exName, today, maxWeight);
    }

    exSaveStatus[exName] = "saved";
    showToast(`✓ ${exName.split(' ').slice(0,2).join(' ')} saved`);
    setTimeout(() => { exSaveStatus[exName] = "idle"; render(); }, 2500);
  } catch(e) {
    exSaveStatus[exName] = "idle";
    showToast("⚠ Save failed", true);
    console.error(e);
  }
  render();
}

async function deleteEntry(histKey, exName, dateStr) {
  // Remove from local cache
  removeRecentEntry(histKey, exName, dateStr);

  // Remove from Firebase history
  try {
    const histRef = doc(db, "history", histKey);
    const histSnap = await getDoc(histRef);
    if (histSnap.exists()) {
      const histData = histSnap.data();
      if (histData[exName]) {
        histData[exName] = histData[exName].filter(e => e.date !== dateStr);
        await setDoc(histRef, histData);
      }
    }

    // If it was today's session entry, also clear from session
    if (dateStr === today) {
      const sessRef = doc(db, "sessions", `${weekKey}_${activeDay}`);
      const sessSnap = await getDoc(sessRef);
      if (sessSnap.exists()) {
        const sessData = sessSnap.data();
        if (sessData.sets && sessData.sets[exName]) {
          delete sessData.sets[exName];
          delete logs[exName];
          await setDoc(sessRef, sessData);
        }
      }
    }
    showToast("🗑 Entry deleted");
  } catch(e) {
    console.error("Delete error:", e);
    showToast("⚠ Delete failed", true);
  }
  render();
}

// ── Sparkline ─────────────────────────────────────────────────────────────
function sparklineSVG(data, color) {
  const vals = data.map(d => d.weight).filter(v => v > 0);
  if (vals.length < 2) return "";
  const min = Math.min(...vals), max = Math.max(...vals), range = max - min || 1;
  const W = 64, H = 20;
  const pts = vals.map((v,i) => `${(i/(vals.length-1))*W},${H-((v-min)/range)*(H-4)-2}`).join(" ");
  const [lx, ly] = pts.split(" ").pop().split(",");
  return `<svg width="${W}" height="${H}" style="display:block;flex-shrink:0"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/><circle cx="${lx}" cy="${ly}" r="2.5" fill="${color}"/></svg>`;
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  const day = PLAN[activeDay];
  const isRest = day.focus === "Rest";

  const tabsHTML = DAYS.map(d => {
    const dp = PLAN[d], active = d === activeDay;
    return `<button class="tab-btn ${active?"active":""}" onclick="switchDay('${d}')" style="border-bottom-color:${active?dp.color:'transparent'}">
      <div>${d.slice(0,3).toUpperCase()}</div>
      <div style="font-size:9px;letter-spacing:1px;margin-top:2px;color:${active?dp.color:'#333'}">${dp.focus.toUpperCase()}</div>
    </button>`;
  }).join("");

  let contentHTML = "";

  if (isRest) {
    contentHTML = `<div style="padding:40px;text-align:center"><div style="font-size:36px;margin-bottom:10px">💤</div><div style="color:#444;font-size:14px">Rest day. Recover, eat, sleep.</div></div>`;
  } else {
    const cards = day.exercises.map((ex, i) => {
      const expanded = expandedEx === i;
      const bw = !!ex.bw;
      const isSmith = !!ex.smith;
      const recent = getRecent(day.histKey, ex.name);
      const lastEntry = recent.length > 0 ? recent[recent.length - 1] : null;
      const thisWeekEntry = recent.find(e => {
        const [d,m,y] = e.date.split('/');
        const entryDate = new Date(y, m-1, d);
        const monday = new Date(weekKey);
        const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
        return entryDate >= monday && entryDate <= sunday;
      });
      const bestW = BEST[day.histKey]?.[ex.name];
      const sparkline = (!bw && recent.length > 1) ? sparklineSVG(recent, day.color) : "";
      const saveStatus = exSaveStatus[ex.name] || "idle";

      // Display weight pill
      let weightPill = "";
      if (!bw) {
        if (thisWeekEntry) {
          weightPill = `<span style="font-size:10px;color:#555">This week: <span style="color:#4ADE80;font-weight:600">${thisWeekEntry.weight} kg${isSmith?" /side":""}</span></span>`;
        } else if (lastEntry) {
          weightPill = `<span style="font-size:10px;color:#555">Last: <span style="color:#BBB;font-weight:600">${lastEntry.weight} kg${isSmith?" /side":""}</span></span>`;
        }
      }
      const bestPill = (!bw && bestW) ? `<span style="font-size:10px;color:#555">Best: <span style="color:#FFB800;font-weight:600">${bestW} kg${isSmith?" /side":""}</span></span>` : "";

      let expandedHTML = "";
      if (expanded) {
        // Recent history with delete buttons
        let recentHTML = "";
        if (!bw && recent.length > 0) {
          const items = recent.slice(-6).map(r => {
            const isToday = r.date === today;
            return `<div style="background:#0A0A0A;border:1px solid ${isToday?day.color+'44':'#1E1E1E'};border-radius:6px;padding:4px 8px;display:flex;align-items:center;gap:6px">
              <div style="text-align:center">
                <div style="font-size:11px;font-weight:600;color:${isToday?day.color:'#DDD'}">${r.weight} kg</div>
                <div style="font-size:9px;color:#3A3A3A;margin-top:1px">${r.date}</div>
              </div>
              <button class="delete-btn" onclick="removeEntry('${day.histKey}','${ex.name}','${r.date}')" title="Delete entry">✕</button>
            </div>`;
          }).join("");
          recentHTML = `<div style="padding:10px 13px;border-bottom:1px solid #161616">
            <div style="font-size:9px;color:#3A3A3A;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Recent sessions</div>
            <div style="display:flex;gap:5px;flex-wrap:wrap">${items}</div>
          </div>`;
        }

        // Set inputs
        const colT = bw ? "28px 1fr 1fr" : "28px 1fr 1fr 1fr";
        const hdrCols = bw
          ? `<div style="font-size:9px;color:#2A2A2A;text-transform:uppercase">#</div><div style="font-size:9px;color:#2A2A2A;text-transform:uppercase">Reps</div><div style="font-size:9px;color:#2A2A2A;text-transform:uppercase">Note</div>`
          : `<div style="font-size:9px;color:#2A2A2A;text-transform:uppercase">#</div><div style="font-size:9px;color:#2A2A2A;text-transform:uppercase">kg${isSmith?" /side":""}</div><div style="font-size:9px;color:#2A2A2A;text-transform:uppercase">Reps</div><div style="font-size:9px;color:#2A2A2A;text-transform:uppercase">Note</div>`;

        const phW = lastEntry?.weight ? `${lastEntry.weight}` : "kg";
        const setRows = Array.from({length: ex.sets}).map((_,si) => {
          const wv = logs[ex.name]?.[si]?.weight || "";
          const rv = logs[ex.name]?.[si]?.reps || "";
          const nv = logs[ex.name]?.[si]?.note || "";
          if (bw) return `<div style="display:grid;grid-template-columns:${colT};gap:5px;margin-bottom:5px">
            <div style="font-size:11px;color:#3A3A3A;display:flex;align-items:center">${si+1}</div>
            <input class="set-input" value="${rv}" placeholder="reps" onchange="setLogVal('${ex.name}',${si},'reps',this.value)">
            <input class="set-input" value="${nv}" placeholder="—" onchange="setLogVal('${ex.name}',${si},'note',this.value)">
          </div>`;
          return `<div style="display:grid;grid-template-columns:${colT};gap:5px;margin-bottom:5px">
            <div style="font-size:11px;color:#3A3A3A;display:flex;align-items:center">${si+1}</div>
            <input class="set-input" value="${wv}" placeholder="${phW}" onchange="setLogVal('${ex.name}',${si},'weight',this.value)">
            <input class="set-input" value="${rv}" placeholder="${ex.reps}" onchange="setLogVal('${ex.name}',${si},'reps',this.value)">
            <input class="set-input" value="${nv}" placeholder="—" onchange="setLogVal('${ex.name}',${si},'note',this.value)">
          </div>`;
        }).join("");

        const btnClass = saveStatus === "saving" ? "ex-save-btn saving" : saveStatus === "saved" ? "ex-save-btn saved" : "ex-save-btn";
        const btnText = saveStatus === "saving" ? "Saving..." : saveStatus === "saved" ? "✓ Saved" : "Save";

        expandedHTML = `<div style="border-top:1px solid #181818">
          <div style="padding:7px 13px;font-size:11px;color:#555;font-style:italic;border-bottom:1px solid #161616">${ex.note}</div>
          ${recentHTML}
          <div style="padding:10px 13px">
            <div style="display:grid;grid-template-columns:${colT};gap:5px;margin-bottom:5px">${hdrCols}</div>
            ${setRows}
            <button class="${btnClass}" onclick="doSaveEx('${ex.name}')" ${saveStatus==="saving"?"disabled":""}>${btnText}</button>
          </div>
        </div>`;
      }

      return `<div class="ex-card">
        <div class="ex-header" onclick="toggleEx(${i})">
          <div style="width:21px;height:21px;border-radius:5px;background:${day.color}20;border:1px solid ${day.color}40;display:flex;align-items:center;justify-content:center;font-size:9px;color:${day.color};font-weight:700;flex-shrink:0">${i+1}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;margin-bottom:3px">${ex.name}</div>
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              <span style="font-size:10px;color:${day.color};background:${day.color}20;padding:2px 7px;border-radius:20px;font-weight:600">${ex.sets}×${ex.reps}</span>
              ${weightPill}${bestPill}
            </div>
          </div>
          ${sparkline}
          <div style="color:#2A2A2A;font-size:11px;flex-shrink:0">${expanded?"▲":"▼"}</div>
        </div>
        ${expandedHTML}
      </div>`;
    }).join("");

    contentHTML = `<div style="padding:14px 14px 60px;max-width:860px;margin:0 auto">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <div style="width:3px;height:30px;border-radius:2px;background:${day.color}"></div>
        <div>
          <div style="font-size:9px;color:#555;letter-spacing:2px;text-transform:uppercase">${activeDay}</div>
          <div style="font-size:17px;font-weight:700">${day.focus} Day</div>
        </div>
      </div>
      ${cards}
    </div>`;
  }

  document.getElementById("root").innerHTML = `
    <div style="background:#0F0F0F;border-bottom:1px solid #1A1A1A;padding:16px 20px">
      <div style="font-size:9px;letter-spacing:3px;color:#444;text-transform:uppercase;margin-bottom:3px">Sanjeeb · Training Log</div>
      <div style="font-size:19px;font-weight:700">Workout Tracker</div>
    </div>
    <div class="tab-bar">${tabsHTML}</div>
    ${contentHTML}
  `;
}

// ── Global handlers ────────────────────────────────────────────────────────
window.switchDay = async function(d) {
  activeDay = d;
  expandedEx = null;
  exSaveStatus = {};
  logs = {};
  render();
  await loadDayFromFirebase(d);
};

window.toggleEx = function(i) {
  expandedEx = expandedEx === i ? null : i;
  render();
};

window.setLogVal = function(exName, si, field, val) {
  if (!logs[exName]) logs[exName] = {};
  if (!logs[exName][si]) logs[exName][si] = {};
  logs[exName][si][field] = val;
};

window.doSaveEx = function(exName) {
  saveExercise(exName);
};

window.removeEntry = function(histKey, exName, dateStr) {
  deleteEntry(histKey, exName, dateStr);
};

// ── Boot ──────────────────────────────────────────────────────────────────
initRecentCache();
render();
loadDayFromFirebase(activeDay);
</script>
